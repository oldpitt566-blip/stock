<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祥老師的投資戰情室 - 嵌入優化版</title>
    <style>
        :root {
            --bg-overlay: rgba(10, 10, 10, 0.45); /* 調淡底色 */
            --nav-bg: rgba(20, 20, 20, 0.85);
            --btn: rgba(45, 45, 45, 0.7); /* 按鈕也稍微調淡 */
            --text: #eee;
            --active: #00b894;
            --external: #e67e22;
        }

        body, html { 
            margin: 0; 
            height: 100%; 
            font-family: "Microsoft JhengHei", sans-serif; 
            overflow: hidden; 
            color: var(--text);
            background: url('shipping-bg.webp') no-repeat center center fixed;
            background-size: cover;
        }
        
        #container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: var(--bg-overlay);
            backdrop-filter: blur(3px);
        }
        
        #nav { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; transition: transform 0.4s ease;
            background: var(--bg-overlay);
            backdrop-filter: blur(8px);
            z-index: 25000; /* 提升層級以覆蓋控制按鈕 */
            overflow-y: auto;
            box-sizing: border-box;
        }
        
        /* 選單隱藏樣式：向上滑出畫面 */
        #container.nav-hidden #nav {
            transform: translateY(-100%);
        }
        
        #nav-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 30000; /* 設為最高層級 */
            background: rgba(108, 92, 231, 0.9);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            transition: 0.3s;
            /* 關鍵：停用觸控預設行為，讓 JavaScript 接管 */
            touch-action: none; 
        }
        
        #nav-toggle:hover { background: rgba(108, 92, 231, 1); transform: scale(1.05); }
        
        #container.active ~ #nav-toggle, body > #nav-toggle { display: block; } 
        #container:not(.active) ~ #nav-toggle { display: none; }

        #content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: white; }
        #container.active #content { display: block; }

        .nav-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        /* 系統功能與常用配置專用的半高樣式 */
        .mini-row .btn, 
        .mini-row #search-input,
        .mini-row #clock-wrapper {
            min-height: 45px !important;
            height: 45px;
            font-size: 1.35rem;
            padding: 5px 10px;
        }

        #clock-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            /* 移除底色與邊框 */
        }

        #clock {
            font-family: monospace;
            font-size: 1.6rem !important; /* 放大時間 */
            color: #00b894;
            font-weight: bold;
            margin: 0 !important;
        }

        .btn { 
            padding: 15px 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
            background: var(--btn); color: white; font-weight: bold; font-size: 1.5rem; 
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            min-height: 80px;
            width: 100%;
            box-sizing: border-box;
        }

        #search-input {
            padding: 10px; border-radius: 6px; border: 1px solid #555; 
            background: #222; color: white; width: 100%; font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        @media (max-width: 600px) {
            #nav { 
                justify-content: flex-start !important; /* 從頂部開始排版，防止裁切 */
                padding-top: 40px; 
            }
            .nav-row {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
                padding: 5px;
            }
            .mini-row .btn, 
            .mini-row #search-input,
            .mini-row #clock-wrapper {
                min-height: 40px !important;
                height: 40px;
                font-size: 0.8rem;
            }
            
            /* 手機版時間層：置頂、寬度 100%、巨大化 */
            #clock-wrapper { 
                grid-column: span 3 !important; 
                display: flex !important;
                height: 70px !important;
                margin-bottom: 15px !important;
                background: rgba(0,0,0,0.2);
                border-radius: 8px;
            }
            #clock { 
                font-size: 2.8rem !important; /* 再次放大時間 */
                color: #00d2ad !important;
                display: block !important;
            }

            /* 手機版標題層：簡化為「祥老師」 */
            #welcome-text { 
                display: block !important;
                transform: translateX(0) !important; 
                text-align: center !important; 
                margin: 0 0 20px 0 !important;
                width: 100% !important;
            }
            #welcome-text h1 { 
                font-size: 2rem !important; 
                letter-spacing: 4px !important; 
                display: block !important;
            }
            .full-title { display: none !important; }
            .short-title { display: inline-block !important; }
            #welcome-text p { display: none !important; } 

            .btn { 
                font-size: 0.8rem;
                padding: 10px 5px; 
                min-height: 70px;
                height: auto;
                line-height: 1.3;
            }
        }

        /* 勾選框邏輯 */
        .split-chk { 
            display: none; width: 25px; height: 25px; 
            cursor: pointer; accent-color: #e84393;
            margin-right: 8px; align-self: center;
        }
        #nav.show-chks .split-chk { display: inline-block; }
        .btn-wrapper { display: flex; align-items: center; width: 100%; }

        #welcome-text { 
            text-shadow: 2px 2px 15px rgba(0,0,0,0.9); 
            text-align: center; 
            margin-bottom: 40px; 
            width: 100%;
            transform: translateX(-40ch); /* 向右修正 20 個字元，總計偏移 -40ch */
        }
        #welcome-text h1 { font-size: 3rem; margin: 0; letter-spacing: 6px; font-weight: 900; }
        .short-title { display: none; } /* 電腦版隱藏簡稱 */

        #welcome-text p { font-size: 1.2rem; margin: 10px 0 0; letter-spacing: 3px; opacity: 0.9; }

        /* 分割畫面佈局修復 */
        #content.split-grid {
            display: grid !important;
            gap: 10px;
            background: #111;
            padding: 8px;
            grid-auto-rows: 1fr;
            height: 100vh;
            box-sizing: border-box;
        }

        .split-item { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
        }

        .split-item iframe { 
            background: white; 
            border: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: 0 0 !important;
            transition: transform 0.2s ease-out;
            z-index: 1;
        }

        /* 視窗控制項 (縮放、重整) 修復 */
        .split-controls {
            position: absolute; 
            top: 10px; 
            left: 10px; 
            z-index: 20000;
            display: flex; 
            gap: 5px; 
            pointer-events: auto;
            /* 確保控制項不隨 Flex 或 Grid 壓縮 */
            flex-shrink: 0;
            white-space: nowrap;
        }
        .ctrl-btn {
            background: rgba(0, 210, 173, 0.9); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px; 
            /* 使用固定像素，防止縮放 */
            width: 45px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        .ctrl-btn:hover { background: rgba(0, 210, 173, 1); transform: translateY(-2px); }
        .zoom-info {
            background: rgba(0, 0, 0, 0.7);
            color: #00d2ad;
            height: 34px;
            padding: 0 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>

</head>
<body>

<button id="nav-toggle">選單 🔽</button>

<div id="container">
    <div id="nav">
        <div id="welcome-text">
            <h1>
                <span class="full-title">祥老師的投資戰情室</span>
                <span class="short-title">祥老師</span>
            </h1>
            <p>監控即時行情，衝刺獲利</p>
        </div>

        <!-- 第一排：系統功能 -->
        <div class="nav-row mini-row">
            <div id="clock-wrapper"><div id="clock"></div></div>
            <button class="btn home-btn" onclick="goHome()">🏠 回首頁</button>
            <button class="btn" style="background:#2d3436" onclick="toggleSplitMode()">🔳 分割配置</button>
            <button id="apply-split" class="btn" style="background:#e84393; display:none;" onclick="startSplit()">🚀 啟動分割</button>
            <button class="btn" style="background:#6c5ce7" onclick="addBtn()">➕ 新增自訂</button>
            <button class="btn" style="background:#f0932b" onclick="saveCurrentLayout()">💾 儲存配置</button>
            <input type="text" id="search-input" placeholder="🔍 搜尋..." oninput="filterButtons()">
        </div>

        <!-- 預設集區域 -->
        <div class="nav-row mini-row" id="presets-row" style="display:none; border-top: 1px solid #444; padding-top: 10px; margin-top: 5px;">
            <div id="presets-list" style="display:contents"></div>
        </div>
        
        <!-- 第二排：可分割內嵌頁面 -->
        <div class="nav-row" id="embed-row">
            <div class="btn-wrapper" data-name="歐線主連"><input type="checkbox" class="split-chk" value="https://quote.eastmoney.com/qihuo/ecm.html?jump_to_web=true"><button class="btn" onclick="loadPage(this, 'https://quote.eastmoney.com/qihuo/ecm.html?jump_to_web=true')">歐線主連</button></div>
            <div class="btn-wrapper" data-name="歐線次主連"><input type="checkbox" class="split-chk" value="https://quote.eastmoney.com/qihuo/ecs.html"><button class="btn" onclick="loadPage(this, 'https://quote.eastmoney.com/qihuo/ecs.html')">歐線次主連</button></div>
            <div class="btn-wrapper" data-name="BDI 指數"><input type="checkbox" class="split-chk" value="https://www.stockq.org/market/baltic_index.php"><button class="btn" onclick="loadPage(this, 'https://www.stockq.org/market/baltic_index.php')">BDI 指數</button></div>
            <div class="btn-wrapper" data-name="Braemar"><input type="checkbox" class="split-chk" value="https://www.braemarscreen.com/"><button class="btn" onclick="loadPage(this, 'https://www.braemarscreen.com/')">Braemar</button></div>
            <div class="btn-wrapper" data-name="美股期貨"><input type="checkbox" class="split-chk" value="https://www.cmoney.tw/usfinance/nq"><button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/usfinance/nq')">美股期貨</button></div>
            <div class="btn-wrapper" data-name="台灣股市"><input type="checkbox" class="split-chk" value="https://www.cmoney.tw/forum/stock"><button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/forum/stock')">台灣股市</button></div>
            <div class="btn-wrapper" data-name="台指期夜盤"><input type="checkbox" class="split-chk" value="https://www.cmoney.tw/forum/futures/TXF1?s=p"><button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/forum/futures/TXF1?s=p')">台指期夜盤</button></div>
            <div class="btn-wrapper" data-name="記憶體報價"><input type="checkbox" class="split-chk" value="https://www.trendforce.com.tw/price/dram/dram_spot"><button class="btn" onclick="loadPage(this, 'https://www.trendforce.com.tw/price/dram/dram_spot')">記憶體報價</button></div>
            <div class="btn-wrapper" data-name="美國經濟數據"><input type="checkbox" class="split-chk" value="eco-data.html"><button class="btn" onclick="loadPage(this, 'eco-data.html')">美國經濟數據</button></div>
            <div class="btn-wrapper" data-name="即時新聞"><input type="checkbox" class="split-chk" value="https://news.cnyes.com/news/cat/headline"><button class="btn" onclick="loadPage(this, 'https://news.cnyes.com/news/cat/headline')">📰 即時新聞</button></div>
            <div id="custom-list" style="display:contents"></div>
        </div>

        <!-- 第三排：外部連結頁面 -->
        <div class="nav-row" id="ext-row">
            <button class="btn ext" data-name="美股指標股" onclick="openExtPage('https://tw.tradingview.com/markets/stocks-usa/market-movers-large-cap/')">美股指標股 ↗</button>
            <button class="btn ext" data-name="台灣指標股" onclick="openExtPage('https://tw.tradingview.com/markets/stocks-taiwan/market-movers-large-cap/')">台灣指標股 ↗</button>
            <button class="btn ext" data-name="台股燈號" onclick="openExtPage('https://index.ndc.gov.tw/n/zh_tw')">台股燈號 ↗</button>
            <button class="btn ext" data-name="融資維持率" onclick="openExtPage('https://www.macromicro.me/charts/53117/taiwan-taiex-maintenance-margin')">融資維持率 ↗</button>
            <button class="btn ext" data-name="SCFI 指數" onclick="openExtPage('https://www.sse.net.cn/index/singleIndex?indexType=scfi')">SCFI 指數 ↗</button>
            <button class="btn ext" data-name="荷姆茲海峽" onclick="openExtPage('https://www.marinetraffic.com/en/ais/home/centerx:56.4/centery:26.1/zoom:9')">荷姆茲海峽 ↗</button>
            <button class="btn ext" data-name="布蘭特原油" onclick="openExtPage('https://tw.tradingview.com/symbols/UKOIL/')">布蘭特原油 ↗</button>
        </div>

    </div>

    <div id="content">
        <iframe id="ifr"></iframe>
    </div>
</div>

<script>
    const container = document.getElementById('container');
    const content = document.getElementById('content');
    let refreshConfigs = []; // {ifr, btn, interval, timer, url, scale}

    // --- 基礎功能 ---
    function clearAllTimers() {
        refreshConfigs.forEach(conf => { if (conf.timer) clearInterval(conf.timer); });
        refreshConfigs = [];
    }

    function toggleNav() {
        container.classList.toggle('nav-hidden');
        updateToggleText();
    }

    function updateToggleText() {
        const toggleBtn = document.getElementById('nav-toggle');
        if (toggleBtn) {
            toggleBtn.innerText = container.classList.contains('nav-hidden') ? '選單 🔽' : '選單 🔼';
        }
    }

    function goHome() {
        clearAllTimers();
        container.classList.remove('active', 'nav-hidden');
        updateToggleText();
        content.classList.remove('split-grid');
        content.innerHTML = '';
        document.getElementById('nav').classList.remove('show-chks');
        document.getElementById('apply-split').style.display = 'none';
        document.querySelectorAll('.split-chk').forEach(c => c.checked = false);
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        if (activeExtWin && !activeExtWin.closed) activeExtWin.close();
        activeExtWin = null;
    }

    // --- 視窗建立核心 ---
    function createViewElement(url, initialInterval = 0, initialScale = 1.0) {
        const wrapper = document.createElement('div');
        wrapper.className = 'split-item';
        
        const controls = document.createElement('div');
        controls.className = 'split-controls';
        
        const refBtn = createCtrlBtn('🔄', () => { ifr.src = url; });
        const autoBtn = createCtrlBtn('🕒', null);
        const zinBtn = createCtrlBtn('➕', () => updateZoom(0.1));
        const zoutBtn = createCtrlBtn('➖', () => updateZoom(-0.1));
        const zInfo = document.createElement('span');
        zInfo.className = 'zoom-info'; zInfo.innerText = Math.round(initialScale * 100) + '%';
        
        const ifr = document.createElement('iframe');
        ifr.src = url;
        
        const myConf = { ifr, btn: autoBtn, interval: initialInterval, timer: null, url, scale: initialScale };
        refreshConfigs.push(myConf);

        // 縮放邏輯
        const updateZoom = (delta) => {
            myConf.scale = Math.round((myConf.scale + delta) * 10) / 10;
            if (myConf.scale < 0.3) myConf.scale = 0.3;
            if (myConf.scale > 2.0) myConf.scale = 2.0;
            ifr.style.width = (100 / myConf.scale) + '%';
            ifr.style.height = (100 / myConf.scale) + '%';
            ifr.style.transform = `scale(${myConf.scale})`;
            zInfo.innerText = Math.round(myConf.scale * 100) + '%';
        };
        if (initialScale !== 1.0) updateZoom(0);

        // 自動重整邏輯
        const intervals = [0, 3000, 5000, 10000, 30000];
        const labels = ['🕒', '🕒 3s', '🕒 5s', '🕒 10s', '🕒 30s'];
        let idx = intervals.indexOf(initialInterval);
        if (idx === -1) idx = 0;

        const setupTimer = () => {
            if (myConf.timer) clearInterval(myConf.timer);
            autoBtn.innerHTML = labels[idx];
            autoBtn.style.background = myConf.interval > 0 ? '#e84393' : '';
            if (myConf.interval > 0) {
                myConf.timer = setInterval(() => {
                    let sx = 0, sy = 0;
                    try { sx = ifr.contentWindow.scrollX; sy = ifr.contentWindow.scrollY; } catch(e) {}
                    ifr.src = ifr.src;
                    const rec = () => { try { ifr.contentWindow.scrollTo(sx, sy); } catch(e) {} ifr.removeEventListener('load', rec); };
                    ifr.addEventListener('load', rec);
                }, myConf.interval);
            }
        };

        autoBtn.onclick = () => {
            idx = (idx + 1) % intervals.length;
            myConf.interval = intervals[idx];
            setupTimer();
        };
        if (initialInterval > 0) setupTimer();

        [refBtn, autoBtn, zinBtn, zoutBtn, zInfo].forEach(el => controls.appendChild(el));
        wrapper.appendChild(controls);
        wrapper.appendChild(ifr);
        return wrapper;
    }

    function createCtrlBtn(text, onClick) {
        const b = document.createElement('button');
        b.className = 'ctrl-btn'; b.innerHTML = text;
        if (onClick) b.onclick = onClick;
        return b;
    }

    // --- 頁面載入 ---
    function loadPage(btn, url, interval = 0, scale = 1.0) {
        // 如果正在分割模式，點擊按鈕改為切換勾選框
        if (document.getElementById('nav').classList.contains('show-chks')) {
            const chk = btn.parentElement.querySelector('.split-chk');
            if (chk) chk.checked = !chk.checked;
            return;
        }

        container.classList.add('active');
        container.classList.add('nav-hidden'); // 自動縮起
        updateToggleText();
        content.classList.remove('split-grid');
        content.innerHTML = '';
        clearAllTimers();
        content.appendChild(createViewElement(url, interval, scale));
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        if (btn) btn.classList.add('selected');
    }

    function toggleSplitMode() {
        const nav = document.getElementById('nav');
        nav.classList.toggle('show-chks');
        document.getElementById('apply-split').style.display = nav.classList.contains('show-chks') ? 'inline-block' : 'none';
        if (!nav.classList.contains('show-chks')) document.querySelectorAll('.split-chk').forEach(c => c.checked = false);
    }

    function startSplit(urls = null) {
        const selected = urls || Array.from(document.querySelectorAll('.split-chk:checked')).map(cb => cb.value);
        if (selected.length < 2) return alert("請至少選擇 2 個網頁");
        
        clearAllTimers();
        content.innerHTML = '';
        content.classList.add('split-grid');
        container.classList.add('active');
        container.classList.add('nav-hidden'); // 自動縮起
        updateToggleText();
        
        // --- 優化網格分配邏輯 ---
        const count = selected.length;
        const cols = count <= 2 ? count : (count <= 4 ? 2 : (count <= 6 ? 3 : 4));
        const rows = Math.ceil(count / cols);
        
        content.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        content.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        content.style.gridAutoRows = "1fr"; // 確保動態行高一致

        selected.forEach(url => {
            const val = typeof url === 'string' ? url : url.url;
            const interval = url.interval || 0;
            const scale = url.scale || 1.0;
            content.appendChild(createViewElement(val, interval, scale));
        });
        
        if (!urls) toggleSplitMode();
    }

    // --- 配置存取 (Layout Presets) ---
    function saveCurrentLayout() {
        if (!container.classList.contains('active')) return alert("請先開啟網頁再儲存配置");
        const name = prompt("請輸入配置名稱：", "我的配置 " + new Date().toLocaleTimeString());
        if (!name) return;

        const preset = {
            name,
            isSplit: content.classList.contains('split-grid'),
            views: refreshConfigs.map(c => ({ url: c.url, interval: c.interval, scale: c.scale }))
        };

        const presets = JSON.parse(localStorage.getItem('user_presets') || "[]");
        presets.push(preset);
        localStorage.setItem('user_presets', JSON.stringify(presets));
        renderPresets();
    }

    function renderPresets() {
        const row = document.getElementById('presets-row');
        const list = document.getElementById('presets-list');
        const presets = JSON.parse(localStorage.getItem('user_presets') || "[]");
        
        if (presets.length === 0) { row.style.display = 'none'; return; }
        row.style.display = 'grid'; // 使用 grid 保持一致性
        list.innerHTML = '';

        presets.forEach((p, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.background = '#4834d4'; // 保留紫色區分
            btn.innerText = p.name;
            btn.onclick = () => {
                if (p.isSplit) startSplit(p.views);
                else loadPage(null, p.views[0].url, p.views[0].interval, p.views[0].scale);
            };
            btn.oncontextmenu = (e) => {
                e.preventDefault();
                if (confirm(`刪除配置「${p.name}」？`)) {
                    presets.splice(i, 1);
                    localStorage.setItem('user_presets', JSON.stringify(presets));
                    renderPresets();
                }
            };
            list.appendChild(btn);
        });
    }

    // --- 時鐘與搜尋 ---
    function updateClock() {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                        now.getMinutes().toString().padStart(2, '0') + ":" + 
                        now.getSeconds().toString().padStart(2, '0');
        document.getElementById('clock').innerText = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function filterButtons() {
        const term = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.btn-wrapper, .btn.ext').forEach(el => {
            const name = el.getAttribute('data-name') || el.innerText;
            el.style.display = name.toLowerCase().includes(term) ? '' : 'none';
        });
    }

    // --- 自訂按鈕 ---
    function addBtn() {
        const name = prompt("名稱：");
        const url = prompt("網址：", "https://");
        if (!name || !url) return;
        const isExt = confirm("是否設定為「另開新視窗」？\n(若網頁出現拒絕連線，請選是)");
        const btns = JSON.parse(localStorage.getItem('user_btns') || "[]");
        btns.push({name, url, isExt});
        localStorage.setItem('user_btns', JSON.stringify(btns));
        renderCustomBtns();
    }

    function renderCustomBtns() {
        const list = document.getElementById('custom-list');
        list.innerHTML = '';
        const btns = JSON.parse(localStorage.getItem('user_btns') || "[]");
        btns.forEach((b, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'btn-wrapper';
            wrapper.setAttribute('data-name', b.name);
            
            const chk = document.createElement('input');
            chk.type = 'checkbox'; chk.className = 'split-chk'; chk.value = b.url;
            
            const btn = document.createElement('button');
            btn.className = 'btn' + (b.isExt ? ' ext' : '');
            btn.innerText = b.name + (b.isExt ? " ↗" : "");
            btn.onclick = () => b.isExt ? openExtPage(b.url) : loadPage(btn, b.url);
            btn.oncontextmenu = (e) => {
                e.preventDefault();
                if (confirm(`刪除「${b.name}」？`)) {
                    btns.splice(i, 1);
                    localStorage.setItem('user_btns', JSON.stringify(btns));
                    renderCustomBtns();
                }
            };
            wrapper.appendChild(chk);
            wrapper.appendChild(btn);
            list.appendChild(wrapper);
        });
        filterButtons(); // 重新套用搜尋
    }

    // --- 外部視窗管理 ---
    let activeExtWin = null;
    function openExtPage(url) {
        activeExtWin = window.open(url, '_blank');
        const timer = setInterval(() => {
            if (activeExtWin && activeExtWin.closed) { clearInterval(timer); activeExtWin = null; goHome(); }
        }, 1000);
    }

    // 資源優化：背景自動暫停與恢復
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
            refreshConfigs.forEach(conf => { if (conf.timer) { clearInterval(conf.timer); conf.timer = null; } });
        } else {
            refreshConfigs.forEach(conf => {
                if (conf.interval > 0) {
                    conf.ifr.src = conf.ifr.src;
                    conf.timer = setInterval(() => { conf.ifr.src = conf.ifr.src; }, conf.interval);
                }
            });
            if (activeExtWin && activeExtWin.closed) { activeExtWin = null; goHome(); }
        }
    });

    // --- 選單拖載與位置管理 ---
    const navToggle = document.getElementById('nav-toggle');
    let isDragging = false;
    let startX, startY, initialX, initialY;

    // 初始化位置
    function initNavPos() {
        const savedPos = JSON.parse(localStorage.getItem('nav_btn_pos'));
        if (savedPos) {
            navToggle.style.left = savedPos.left;
            navToggle.style.top = savedPos.top;
            navToggle.style.right = 'auto';
        }
    }

    navToggle.onpointerdown = (e) => {
        isDragging = false;
        startX = e.clientX;
        startY = e.clientY;
        const rect = navToggle.getBoundingClientRect();
        initialX = rect.left;
        initialY = rect.top;
        navToggle.setPointerCapture(e.pointerId);
        navToggle.style.transition = 'none'; // 拖動時暫停動畫
    };

    navToggle.onpointermove = (e) => {
        if (e.buttons === 0) return; // 沒按下就不動
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        
        // 判斷移動距離，超過 5px 才算拖動
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            isDragging = true;
            navToggle.style.left = (initialX + dx) + 'px';
            navToggle.style.top = (initialY + dy) + 'px';
            navToggle.style.right = 'auto';
        }
    };

    navToggle.onpointerup = (e) => {
        navToggle.releasePointerCapture(e.pointerId);
        navToggle.style.transition = '0.3s'; // 恢復動畫
        
        if (!isDragging) {
            toggleNav(); // 如果沒移動，就執行原本的開關選單
        } else {
            // 如果有移動，儲存新位置
            localStorage.setItem('nav_btn_pos', JSON.stringify({
                left: navToggle.style.left,
                top: navToggle.style.top
            }));
        }
    };

    initNavPos();
    renderCustomBtns();
    renderPresets();
</script>

</body>
</html>
