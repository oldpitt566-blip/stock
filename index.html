<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航運戰情室 - 嵌入優化版</title>
    <style>
        :root {
            --bg-overlay: rgba(18, 18, 18, 0.75);
            --nav-bg: rgba(30, 30, 30, 0.9);
            --btn: rgba(51, 51, 51, 0.8);
            --text: #eee;
            --active: #00b894;
            --external: #e67e22;
        }

        body, html { 
            margin: 0; 
            height: 100%; 
            font-family: "Microsoft JhengHei", sans-serif; 
            overflow: hidden; 
            color: var(--text);
            /* 設定背景圖為 shipping-bg.webp */
            background: url('shipping-bg.webp') no-repeat center center fixed;
            background-size: cover;
        }
        
        #container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: var(--bg-overlay);
            backdrop-filter: blur(3px);
        }
        
        #nav { 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 10px;
            flex-grow: 1; padding: 20px; transition: 0.5s ease;
        }
        
        #container.active #nav { 
            flex-grow: 0; 
            justify-content: flex-start; 
            padding: 8px 15px; 
            background: var(--nav-bg);
            backdrop-filter: none;
        }

        .btn { 
            padding: 12px 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
            background: var(--btn); color: white; font-weight: bold; font-size: 1rem; 
            transition: all 0.2s;
        }
        
        #container.active .btn { padding: 5px 12px; font-size: 0.85rem; }
        
        .btn:hover { background: rgba(80, 80, 80, 0.9); transform: translateY(-2px); }
        .btn.selected { background: var(--active); border-color: #fff; }
        
        .btn.ext { border-left: 4px solid var(--external); }

        .home-btn { background: #d35400 !important; display: none; }
        #container.active .home-btn { display: inline-block; }

        #content { flex-grow: 1; display: none; background: white; }
        #container.active #content { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        #welcome-text { text-shadow: 2px 2px 10px rgba(0,0,0,0.8); text-align: center; margin-bottom: 20px; }
        #container.active #welcome-text { display: none; }
    </style>
</head>
<body>

<div id="container">
    <div id="nav">
        <div id="welcome-text" style="width: 100%;">
            <h1 style="font-size: 2.5rem; margin: 0;">航運戰情室</h1>
            <p style="font-size: 1.1rem; opacity: 0.8;">監控即時行情，衝刺獲利</p>
        </div>

        <button class="btn home-btn" onclick="goHome()">🏠 回首頁</button>
        
        <button class="btn" onclick="loadPage(this, 'https://quote.eastmoney.com/qihuo/ecm.html?jump_to_web=true')">歐線主連</button>
        <button class="btn" onclick="loadPage(this, 'https://quote.eastmoney.com/qihuo/ecs.html')">歐線次主連</button>
        <button class="btn" onclick="loadPage(this, 'https://www.stockq.org/market/baltic_index.php')">BDI 指數</button>
        <button class="btn" onclick="loadPage(this, 'https://www.stockq.org/index/SCFI.php')">SCFI 指數</button>
        <button class="btn" onclick="loadPage(this, 'https://www.braemarscreen.com/')">Braemar</button>
        
        <button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/usfinance/nq')">美股期貨</button>
        <button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/forum/futures/TXF1?s=p')">台指夜盤</button>

        <button class="btn ext" onclick="window.open('https://www.marinetraffic.com/en/ais/home/centerx:56.4/centery:26.1/zoom:9', '_blank')">荷姆茲海峽 ↗</button>
        <button class="btn ext" onclick="window.open('https://tw.tradingview.com/symbols/UKOIL/', '_blank')">布蘭特原油 ↗</button>

        <div id="custom-list" style="display:contents"></div>
        <button class="btn" style="background:#6c5ce7" onclick="addBtn()">➕ 新增自訂</button>
    </div>

    <div id="content">
        <iframe id="ifr"></iframe>
    </div>
</div>

<script>
    const container = document.getElementById('container');
    const ifr = document.getElementById('ifr');

    function loadPage(btn, url) {
        container.classList.add('active');
        ifr.src = url;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function goHome() {
        container.classList.remove('active');
        ifr.src = "";
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
    }

    function addBtn() {
        const name = prompt("名稱：");
        const url = prompt("網址：", "https://");
        if(!name || !url) return;
        const isExt = confirm("是否設定為「另開新視窗」？\n(若網頁出現拒絕連線，請選是)");
        const btns = JSON.parse(localStorage.getItem('user_btns') || "[]");
        btns.push({name, url, isExt});
        localStorage.setItem('user_btns', JSON.stringify(btns));
        render();
    }

    function render() {
        const list = document.getElementById('custom-list');
        list.innerHTML = '';
        const btns = JSON.parse(localStorage.getItem('user_btns') || "[]");
        btns.forEach((b, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn' + (b.isExt ? ' ext' : '');
            btn.innerText = b.name + (b.isExt ? " ↗" : "");
            btn.onclick = () => b.isExt ? window.open(b.url, '_blank') : loadPage(btn, b.url);
            btn.oncontextmenu = (e) => {
                e.preventDefault();
                if(confirm(`刪除「${b.name}」？`)) {
                    btns.splice(i, 1);
                    localStorage.setItem('user_btns', JSON.stringify(btns));
                    render();
                }
            };
            list.appendChild(btn);
        });
    }
    render();
</script>
</body>
</html>
