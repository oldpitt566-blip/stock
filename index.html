<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航運戰情室 - 嵌入優化版</title>
    <style>
        :root {
            --bg-overlay: rgba(18, 18, 18, 0.75);
            --nav-bg: rgba(30, 30, 30, 0.9);
            --btn: rgba(51, 51, 51, 0.8);
            --text: #eee;
            --active: #00b894;
            --external: #e67e22;
        }

        body, html { 
            margin: 0; 
            height: 100%; 
            font-family: "Microsoft JhengHei", sans-serif; 
            overflow: hidden; 
            color: var(--text);
            /* 設定背景圖為 shipping-bg.webp */
            background: url('shipping-bg.webp') no-repeat center center fixed;
            background-size: cover;
        }
        
        #container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: var(--bg-overlay);
            backdrop-filter: blur(3px);
        }
        
        #nav { 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 10px;
            flex-grow: 1; padding: 20px; transition: 0.5s ease;
        }
        
        #container.active #nav { 
            flex-grow: 0; 
            justify-content: flex-start; 
            padding: 8px 15px; 
            background: var(--nav-bg);
            backdrop-filter: none;
            flex-direction: column;
            align-items: flex-start;
        }

        .nav-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        #container.active .nav-row {
            justify-content: flex-start;
            margin-bottom: 5px;
            gap: 8px;
        }

        .btn { 
            padding: 12px 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
            background: var(--btn); color: white; font-weight: bold; font-size: 1rem; 
            transition: all 0.2s;
        }
        
        #container.active .btn { padding: 5px 12px; font-size: 0.85rem; }
        
        .btn:hover { background: rgba(80, 80, 80, 0.9); transform: translateY(-2px); }
        .btn.selected { background: var(--active); border-color: #fff; }
        
        .btn.ext { border-left: 4px solid var(--external); }

        .home-btn { background: #d35400 !important; display: none; }
        #container.active .home-btn { display: inline-block; }

        #content { flex-grow: 1; display: none; background: white; }
        #container.active #content { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
/* 所有模式下的 iframe 縮放修正 */
.split-item iframe { 
    background: white; 
    border: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform-origin: 0 0 !important;
    transition: transform 0.2s ease-out;
    z-index: 1;
}

#content.split-grid {
    display: grid !important;
    gap: 8px;
    background: #222;
    padding: 4px;
    grid-template-columns: repeat(auto-fit, minmax(45%, 1fr));
    grid-auto-rows: 1fr;
}
        /* 分割畫面內的小工具 */
        .split-item { position: relative; width: 100%; height: 100%; overflow: hidden; background: #111; }
        .split-controls {
            position: absolute; top: 10px; left: 10px; z-index: 9999;
            display: flex; gap: 6px; pointer-events: auto;
        }
        .ctrl-btn {
            background: rgba(0, 184, 148, 0.9); color: white; border: none;
            border-radius: 4px; padding: 6px 10px; cursor: pointer;
            font-size: 0.8rem; font-weight: bold; backdrop-filter: blur(4px);
            transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .ctrl-btn:hover { background: rgba(0, 184, 148, 1); transform: translateY(-1px); }
        .zoom-info {
            background: rgba(45, 52, 54, 0.9); color: white; padding: 4px 8px;
            border-radius: 4px; font-size: 0.75rem; align-self: center;
            backdrop-filter: blur(4px); font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        #content.split-grid iframe { 
            background: white; 
            border: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: 0 0 !important;
            transition: transform 0.2s ease-out;
            z-index: 1;
        }

        /* 勾選框樣式 */
        .btn-wrapper { display: flex; align-items: center; gap: 5px; }
        .split-chk { 
            display: none; width: 20px; height: 20px; cursor: pointer; 
            accent-color: #e84393;
        }
        #nav.show-chks .split-chk { display: inline-block; }

        #welcome-text { text-shadow: 2px 2px 10px rgba(0,0,0,0.8); text-align: center; margin-bottom: 20px; }
        #container.active #welcome-text { display: none; }
    </style>
</head>
<body>

<div id="container">
    <div id="nav">
        <div id="welcome-text" style="width: 100%;">
            <h1 style="font-size: 2.5rem; margin: 0;">航運戰情室</h1>
            <p style="font-size: 1.1rem; opacity: 0.8;">監控即時行情，衝刺獲利</p>
        </div>

        <!-- 第一排：系統功能 -->
        <div class="nav-row">
            <button class="btn home-btn" onclick="goHome()">🏠 回首頁</button>
            <button class="btn" style="background:#2d3436" onclick="toggleSplitMode()">🔳 分割配置</button>
            <button id="apply-split" class="btn" style="background:#e84393; display:none;" onclick="startSplit()">🚀 啟動分割</button>
            <button class="btn" style="background:#6c5ce7" onclick="addBtn()">➕ 新增自訂</button>
        </div>
        
        <!-- 第二排：可分割內嵌頁面 -->
        <div class="nav-row" id="embed-row">
            <div class="btn-wrapper"><input type="checkbox" class="split-chk" value="https://quote.eastmoney.com/qihuo/ecm.html?jump_to_web=true"><button class="btn" onclick="loadPage(this, 'https://quote.eastmoney.com/qihuo/ecm.html?jump_to_web=true')">歐線主連</button></div>
            <div class="btn-wrapper"><input type="checkbox" class="split-chk" value="https://quote.eastmoney.com/qihuo/ecs.html"><button class="btn" onclick="loadPage(this, 'https://quote.eastmoney.com/qihuo/ecs.html')">歐線次主連</button></div>
            <div class="btn-wrapper"><input type="checkbox" class="split-chk" value="https://www.stockq.org/market/baltic_index.php"><button class="btn" onclick="loadPage(this, 'https://www.stockq.org/market/baltic_index.php')">BDI 指數</button></div>
            <div class="btn-wrapper"><input type="checkbox" class="split-chk" value="https://www.stockq.org/index/SCFI.php"><button class="btn" onclick="loadPage(this, 'https://www.stockq.org/index/SCFI.php')">SCFI 指數</button></div>
            <div class="btn-wrapper"><input type="checkbox" class="split-chk" value="https://www.braemarscreen.com/"><button class="btn" onclick="loadPage(this, 'https://www.braemarscreen.com/')">Braemar</button></div>
            <div class="btn-wrapper"><input type="checkbox" class="split-chk" value="https://www.cmoney.tw/usfinance/nq"><button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/usfinance/nq')">美股期貨</button></div>
            <div class="btn-wrapper"><input type="checkbox" class="split-chk" value="https://www.cmoney.tw/forum/futures/TXF1?s=p"><button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/forum/futures/TXF1?s=p')">台指夜盤</button></div>
            <div class="btn-wrapper"><input type="checkbox" class="split-chk" value="https://www.trendforce.com.tw/price/dram/dram_spot"><button class="btn" onclick="loadPage(this, 'https://www.trendforce.com.tw/price/dram/dram_spot')">記憶體報價</button></div>
            <div class="btn-wrapper"><input type="checkbox" class="split-chk" value="eco-data.html"><button class="btn" onclick="loadPage(this, 'eco-data.html')">美國經濟數據</button></div>
            <div id="custom-list" style="display:contents"></div>
        </div>

        <!-- 第三排：外部連結頁面 -->
        <div class="nav-row">
            <button class="btn ext" onclick="openExtPage('https://tw.tradingview.com/markets/stocks-usa/market-movers-large-cap/')">美股指標股 ↗</button>
            <button class="btn ext" onclick="openExtPage('https://tw.tradingview.com/markets/stocks-taiwan/market-movers-large-cap/')">台灣指標股 ↗</button>
            <button class="btn ext" onclick="openExtPage('https://index.ndc.gov.tw/n/zh_tw')">台股燈號 ↗</button>
            <button class="btn ext" onclick="openExtPage('https://www.marinetraffic.com/en/ais/home/centerx:56.4/centery:26.1/zoom:9')">荷姆茲海峽 ↗</button>
            <button class="btn ext" onclick="openExtPage('https://tw.tradingview.com/symbols/UKOIL/')">布蘭特原油 ↗</button>
        </div>
    </div>

    <div id="content">
        <iframe id="ifr"></iframe>
    </div>
</div>

<script>
    const container = document.getElementById('container');
    const ifr = document.getElementById('ifr');

    function loadPage(btn, url) {
        container.classList.add('active');
        const content = document.getElementById('content');
        content.classList.remove('split-grid');
        content.innerHTML = ''; // 清空內容
        
        // 清除舊的自動重整定時器
        autoRefreshTimers.forEach(t => clearInterval(t));
        autoRefreshTimers = [];

        // 建立與分割畫面一致的控制結構
        const wrapper = document.createElement('div');
        wrapper.className = 'split-item';
        
        const controls = document.createElement('div');
        controls.className = 'split-controls';
        
        const refBtn = document.createElement('button');
        refBtn.className = 'ctrl-btn';
        refBtn.innerHTML = '🔄';
        
        const autoBtn = document.createElement('button');
        autoBtn.className = 'ctrl-btn';
        autoBtn.innerHTML = '🕒';
        
        const zinBtn = document.createElement('button');
        zinBtn.className = 'ctrl-btn';
        zinBtn.innerHTML = '➕';
        
        const zoutBtn = document.createElement('button');
        zoutBtn.className = 'ctrl-btn';
        zoutBtn.innerHTML = '➖';
        
        const zInfo = document.createElement('span');
        zInfo.className = 'zoom-info';
        zInfo.innerText = '100%';
        
        const ifr = document.createElement('iframe');
        ifr.id = 'ifr';
        ifr.src = url;
        
        // 自動重整邏輯
        let refreshInterval = 0;
        let refreshTimer = null;
        const intervals = [0, 3000, 5000, 10000];
        const labels = ['🕒', '🕒 3s', '🕒 5s', '🕒 10s'];
        let currentIdx = 0;

        autoBtn.onclick = () => {
            currentIdx = (currentIdx + 1) % intervals.length;
            refreshInterval = intervals[currentIdx];
            autoBtn.innerHTML = labels[currentIdx];
            if (refreshTimer) clearInterval(refreshTimer);
            if (refreshInterval > 0) {
                autoBtn.style.background = '#e84393';
                refreshTimer = setInterval(() => { ifr.src = ifr.src; }, refreshInterval);
                autoRefreshTimers.push(refreshTimer);
            } else {
                autoBtn.style.background = '';
            }
        };

        let currentScale = 1.0;
        const updateZoom = (delta) => {
            currentScale = Math.round((currentScale + delta) * 10) / 10;
            if (currentScale < 0.3) currentScale = 0.3;
            if (currentScale > 2.0) currentScale = 2.0;
            ifr.style.width = (100 / currentScale) + '%';
            ifr.style.height = (100 / currentScale) + '%';
            ifr.style.transform = `scale(${currentScale})`;
            zInfo.innerText = Math.round(currentScale * 100) + '%';
        };

        refBtn.onclick = () => { ifr.src = url; };
        zinBtn.onclick = () => updateZoom(0.1);
        zoutBtn.onclick = () => updateZoom(-0.1);

        controls.appendChild(refBtn);
        controls.appendChild(autoBtn);
        controls.appendChild(zinBtn);
        controls.appendChild(zoutBtn);
        controls.appendChild(zInfo);
        
        wrapper.appendChild(controls);
        wrapper.appendChild(ifr);
        content.appendChild(wrapper);

        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        if(btn) btn.classList.add('selected');
    }

    function toggleSplitMode() {
        const nav = document.getElementById('nav');
        const applyBtn = document.getElementById('apply-split');
        nav.classList.toggle('show-chks');
        applyBtn.style.display = nav.classList.contains('show-chks') ? 'inline-block' : 'none';
        if(!nav.classList.contains('show-chks')) {
            document.querySelectorAll('.split-chk').forEach(c => c.checked = false);
        }
    }

    let autoRefreshTimers = [];

    function startSplit() {
        const selected = Array.from(document.querySelectorAll('.split-chk:checked')).map(cb => cb.value);
        if (selected.length < 2) return alert("請至少勾選 2 個網頁進行分割");
        
        // 清除舊的自動重整定時器
        autoRefreshTimers.forEach(t => clearInterval(t));
        autoRefreshTimers = [];

        const content = document.getElementById('content');
        content.innerHTML = '';
        content.classList.add('split-grid');
        container.classList.add('active');
        
        let cols = selected.length > 9 ? 4 : (selected.length > 4 ? 3 : 2);
        content.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        selected.forEach(url => {
            const wrapper = document.createElement('div');
            wrapper.className = 'split-item';
            
            const controls = document.createElement('div');
            controls.className = 'split-controls';
            
            const refBtn = document.createElement('button');
            refBtn.className = 'ctrl-btn';
            refBtn.innerHTML = '🔄';
            
            const autoBtn = document.createElement('button');
            autoBtn.className = 'ctrl-btn';
            autoBtn.innerHTML = '🕒';
            autoBtn.title = '每3秒自動重整';
            
            const zinBtn = document.createElement('button');
            zinBtn.className = 'ctrl-btn';
            zinBtn.innerHTML = '➕';
            
            const zoutBtn = document.createElement('button');
            zoutBtn.className = 'ctrl-btn';
            zoutBtn.innerHTML = '➖';
            
            const zInfo = document.createElement('span');
            zInfo.className = 'zoom-info';
            zInfo.innerText = '100%';
            
            const ifr = document.createElement('iframe');
            ifr.src = url;
            
            // 自動重整邏輯 (改為循環切換: 關閉 -> 3s -> 5s -> 10s -> 關閉)
            let refreshInterval = 0;
            let refreshTimer = null;
            
            const intervals = [0, 3000, 5000, 10000];
            const labels = ['🕒', '🕒 3s', '🕒 5s', '🕒 10s'];
            let currentIdx = 0;

            autoBtn.onclick = () => {
                currentIdx = (currentIdx + 1) % intervals.length;
                refreshInterval = intervals[currentIdx];
                autoBtn.innerHTML = labels[currentIdx];
                
                if (refreshTimer) {
                    clearInterval(refreshTimer);
                    refreshTimer = null;
                }

                if (refreshInterval > 0) {
                    autoBtn.style.background = '#e84393'; // 啟動中
                    refreshTimer = setInterval(() => {
                        ifr.src = ifr.src;
                    }, refreshInterval);
                    autoRefreshTimers.push(refreshTimer);
                } else {
                    autoBtn.style.background = ''; // 關閉
                }
            };

            let currentScale = 1.0;
            const updateZoom = (delta) => {
                currentScale = Math.round((currentScale + delta) * 10) / 10;
                if (currentScale < 0.3) currentScale = 0.3;
                if (currentScale > 2.0) currentScale = 2.0;
                
                ifr.style.width = (100 / currentScale) + '%';
                ifr.style.height = (100 / currentScale) + '%';
                ifr.style.transform = `scale(${currentScale})`;
                zInfo.innerText = Math.round(currentScale * 100) + '%';
            };

            refBtn.onclick = () => { ifr.src = url; };
            zinBtn.onclick = () => updateZoom(0.1);
            zoutBtn.onclick = () => updateZoom(-0.1);

            controls.appendChild(refBtn);
            controls.appendChild(autoBtn);
            controls.appendChild(zinBtn);
            controls.appendChild(zoutBtn);
            controls.appendChild(zInfo);
            
            wrapper.appendChild(controls);
            wrapper.appendChild(ifr);
            content.appendChild(wrapper);
        });
        
        toggleSplitMode();
    }

    let activeExtWin = null;

    function openExtPage(url) {
        activeExtWin = window.open(url, '_blank');
        
        // 定時器備援 (電腦版較穩定)
        const timer = setInterval(() => {
            if (activeExtWin && activeExtWin.closed) {
                clearInterval(timer);
                activeExtWin = null;
                goHome();
            }
        }, 1000);
    }

    // 手機版優化：當使用者切換回本分頁時，立刻檢查外部分頁是否已關閉
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && activeExtWin) {
            if (activeExtWin.closed) {
                activeExtWin = null;
                goHome();
            }
        }
    });

    function goHome() {
        // 1. 清除所有自動重整定時器
        autoRefreshTimers.forEach(t => clearInterval(t));
        autoRefreshTimers = [];

        // 2. 移除容器 active 狀態 (內容區隱藏)
        container.classList.remove('active');

        // 3. 徹底清空內容區塊並重設樣式
        const content = document.getElementById('content');
        content.classList.remove('split-grid');
        content.innerHTML = ''; 

        // 4. 強制關閉「分割配置模式」
        const nav = document.getElementById('nav');
        nav.classList.remove('show-chks');
        const applyBtn = document.getElementById('apply-split');
        if(applyBtn) applyBtn.style.display = 'none';
        document.querySelectorAll('.split-chk').forEach(c => c.checked = false);

        // 5. 重置按鈕選取狀態
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
        
        // 6. 若有開啟中的外部視窗則關閉它 (選用，增加連動感)
        if (activeExtWin && !activeExtWin.closed) {
            activeExtWin.close();
        }
        activeExtWin = null;
    }

    function addBtn() {
        const name = prompt("名稱：");
        const url = prompt("網址：", "https://");
        if(!name || !url) return;
        const isExt = confirm("是否設定為「另開新視窗」？\n(若網頁出現拒絕連線，請選是)");
        const btns = JSON.parse(localStorage.getItem('user_btns') || "[]");
        btns.push({name, url, isExt});
        localStorage.setItem('user_btns', JSON.stringify(btns));
        render();
    }

    function render() {
        const list = document.getElementById('custom-list');
        list.innerHTML = '';
        const btns = JSON.parse(localStorage.getItem('user_btns') || "[]");
        btns.forEach((b, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'btn-wrapper';
            
            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.className = 'split-chk';
            chk.value = b.url;
            
            const btn = document.createElement('button');
            btn.className = 'btn' + (b.isExt ? ' ext' : '');
            btn.innerText = b.name + (b.isExt ? " ↗" : "");
            btn.onclick = () => b.isExt ? openExtPage(b.url) : loadPage(btn, b.url);
            btn.oncontextmenu = (e) => {
                e.preventDefault();
                if(confirm(`刪除「${b.name}」？`)) {
                    btns.splice(i, 1);
                    localStorage.setItem('user_btns', JSON.stringify(btns));
                    render();
                }
            };
            wrapper.appendChild(chk);
            wrapper.appendChild(btn);
            list.appendChild(wrapper);
        });
    }
    render();
</script>
</body>
</html>
