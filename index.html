<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祥老師的投資戰情室 - AI王風格版</title>
    <style id="theme-style">
        /* 預設為航海王風格變數 */
        :root {
            --primary: #006241; 
            --accent: #e60012;  
            --bg-nav: rgba(15, 20, 25, 0.65); 
            --btn-bg: rgba(45, 50, 55, 0.7);
            --text: #ffffff;
            --gold: #f1c40f;
            --glow: #00d2ad;
            --bg-img: url('sea.png'); 
            --btn-gradient: none;
        }

        /* 祥老師風格變數 */
        [data-theme="shiang"] {
            --primary: #00b894; 
            --accent: #e84393;
            --bg-nav: rgba(10, 10, 10, 0.6); 
            --btn-bg: rgba(45, 45, 45, 0.6);
            --text: #eee;
            --gold: #00d2ad;
            --glow: #00b894;
            --bg-img: url('hsiang.png'); 
            --btn-gradient: none;
        }

        /* AI王風格：紫色與藍色的流動漸層 */
        [data-theme="ai"] {
            --primary: #6c5ce7; /* 核心紫 */
            --accent: #00d2ff;  /* 科技藍 */
            --bg-nav: rgba(10, 10, 35, 0.7); /* 深海藍透明 */
            --btn-bg: rgba(40, 40, 80, 0.5);
            --text: #ffffff;
            --gold: #00d2ff; /* 在 AI 模式下金改為電藍 */
            --glow: #a29bfe;
            --bg-img: url('tsmc.png'); 
            --btn-gradient: linear-gradient(135deg, rgba(108, 92, 231, 0.6), rgba(0, 210, 255, 0.6));
        }

        body, html { 
            margin: 0; height: 100%; font-family: "Microsoft JhengHei", "Segoe UI", sans-serif; 
            overflow: hidden; color: var(--text);
            background: var(--bg-img) no-repeat center center fixed; background-size: cover;
            transition: background 0.8s ease; 
        }
        
        #container { display: flex; flex-direction: column; height: 100vh; background: rgba(0, 0, 0, 0.4); }
        
        #nav { 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 40px 20px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-nav); 
            z-index: 25000; overflow-y: auto; box-sizing: border-box;
            border-bottom: 5px solid var(--primary);
            backdrop-filter: blur(10px); /* 僅在選單區域保留輕微磨砂感以保護文字 */
        }
        
        #container.nav-hidden #nav { transform: translateY(-100%); }
        
        #nav-toggle {
            position: fixed; top: 15px; right: 15px; z-index: 30000;
            background: var(--primary); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 24px; border-radius: 4px; cursor: pointer;
            font-size: 1rem; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: 0.3s; letter-spacing: 2px; touch-action: none;
        }
        
        /* AI模式下導航鈕發光 */
        [data-theme="ai"] #nav-toggle {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.5);
            border: none;
        }

        #content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: #000; }
        #container.active #content { display: block; }

        .nav-row {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; width: 100%; max-width: 1200px; margin-bottom: 25px;
        }

        .mini-row { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .mini-row > * { min-height: 50px !important; height: 50px; box-sizing: border-box; }

        #clock { font-family: 'Courier New', monospace; font-size: 1.8rem; color: var(--glow); font-weight: 900; text-shadow: 0 0 10px rgba(0, 210, 173, 0.5); }

        .btn { 
            padding: 5px 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
            background: var(--btn-bg); 
            background-image: var(--btn-gradient); /* 套用 AI 漸層 */
            color: white; font-weight: bold; font-size: 1.1rem; 
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            text-align: center; width: 100%; box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05); border-bottom: 4px solid rgba(0,0,0,0.4);
        }
        #nav-toggle, .nav-row:not(.mini-row) .btn { min-height: 85px; font-size: 1.3rem; }

        .btn:hover { 
            filter: brightness(1.2); 
            transform: translateY(-3px); 
            border-bottom-color: var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        /* AI 模式懸停發光 */
        [data-theme="ai"] .btn:hover {
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.4), 0 0 40px rgba(0, 210, 255, 0.2);
            border-color: var(--accent);
        }

        .btn.selected { background: var(--primary) !important; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        [data-theme="ai"] .btn.selected {
            background: linear-gradient(135deg, var(--primary), var(--accent)) !important;
            box-shadow: 0 0 25px rgba(108, 92, 231, 0.6);
        }

        #search-input {
            padding: 12px; border-radius: 4px; border: 1px solid #444; 
            background: rgba(0,0,0,0.3); color: white; width: 100%; font-size: 1.1rem;
            outline: none; border-bottom: 3px solid var(--primary);
            transition: 0.3s;
        }
        #search-input:focus { border-bottom-color: var(--accent); background: rgba(0,0,0,0.5); }

        .style-select-wrapper { position: relative; display: flex; width: 100%; padding: 0 !important; }
        #style-btn { border-left: 4px solid #a29bfe; margin: 0; height: 100%; }
        
        .style-dropdown { 
            position: absolute; top: 100%; left: 0; width: 100%; background: #1a1a2e; 
            border: 1px solid #444; border-radius: 4px; display: none; z-index: 35000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8); overflow: hidden;
        }
        .style-dropdown.show { display: block; }
        .style-option { padding: 15px; cursor: pointer; font-weight: bold; border-bottom: 1px solid #333; transition: 0.2s; color: #fff; font-size: 1rem; }
        .style-option:hover { background: linear-gradient(90deg, var(--primary), var(--accent)); color: white; }

        .row-label {
            text-align: left; max-width: 1200px; margin: 0 auto 12px; 
            font-weight: 900; font-size: 1.2rem; padding-left: 15px;
            letter-spacing: 2px; border-left: 6px solid var(--primary); text-transform: uppercase;
            transition: 0.3s;
        }
        [data-theme="ai"] .row-label {
            border-left-image: linear-gradient(to bottom, var(--primary), var(--accent)) 1;
            border-left-width: 6px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        @media (max-width: 600px) {
            #nav { padding-top: 60px; justify-content: flex-start; }
            .nav-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .mini-row { grid-template-columns: repeat(4, 1fr) !important; }
            .mini-row #clock-wrapper { grid-column: span 4; }
            .mini-row #search-input { grid-column: span 2; }
            .mini-row .style-select-wrapper { grid-column: span 2; }
            #clock { font-size: 2.5rem !important; }
            #welcome-text h1 { font-size: 2.2rem !important; }
        }

        #welcome-text { text-shadow: 2px 2px 15px rgba(0,0,0,0.9); text-align: center; margin-bottom: 40px; }
        #welcome-text h1 { font-size: 3.5rem; margin: 0; letter-spacing: 8px; font-weight: 900; color: var(--gold); text-shadow: 4px 4px 0px rgba(0,0,0,0.8); cursor: pointer; transition: 0.3s; }
        [data-theme="ai"] #welcome-text h1 { color: #fff; text-shadow: 0 0 20px rgba(108, 92, 231, 0.8); }
        #welcome-text p { font-size: 1.3rem; margin: 10px 0 0; letter-spacing: 5px; color: #ccc; }

        .split-item { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; border: 1px solid #333; }
        .split-item iframe { background: white; border: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }

        .split-controls { position: absolute; top: 10px; left: 10px; z-index: 20000; display: flex; gap: 5px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; border: 1px solid var(--primary); }
        .ctrl-btn { background: var(--primary); color: white; border: 1px solid rgba(255,255,255,0.3); width: 45px; height: 40px; cursor: pointer; font-size: 20px; font-weight: bold; transition: 0.2s; }
        .ctrl-btn:hover { filter: brightness(1.2); }
        .zoom-info { background: rgba(0, 0, 0, 0.7); color: var(--gold); height: 34px; padding: 0 8px; border-radius: 4px; font-size: 13px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        .split-chk { display: none; width: 25px; height: 25px; accent-color: var(--accent); margin-right: 8px; }
        #nav.show-chks .split-chk { display: inline-block; }
        .btn-wrapper { display: flex; align-items: center; width: 100%; position: relative; }
        .del-badge { position: absolute; top: -10px; right: -10px; background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; border: 2px solid white; z-index: 100; }
        body.manage-mode .del-badge { display: flex; }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(1deg); } 75% { transform: rotate(-1deg); } 100% { transform: rotate(0deg); } }
        body.manage-mode .btn-wrapper .btn { animation: shake 0.3s infinite; pointer-events: none; }
    </style>
</head>
<body>

<button id="nav-toggle">選單 🔽</button>

<div id="container">
    <div id="nav">
        <div id="welcome-text">
            <h1 onclick="goHome()">祥老師戰情室</h1>
            <p>監控即時行情，衝刺獲利</p>
        </div>

        <div class="nav-row mini-row">
            <div id="clock-wrapper"><div id="clock"></div></div>
            <button class="btn" style="background:#2d3436; border-left: 4px solid var(--primary);" onclick="toggleSplitMode()">分割</button>
            <button id="apply-split" class="btn" style="background:var(--accent); display:none;" onclick="startSplit()">啟動</button>
            <button class="btn" style="background:#2d3436; border-left: 4px solid #6c5ce7;" onclick="addBtn()">新增</button>
            <button class="btn" style="background:#2d3436; border-left: 4px solid #f0932b;" onclick="saveCurrentLayout()">儲存</button>
            <button id="manage-btn" class="btn" style="background:var(--accent);" onclick="toggleManageMode()">管理</button>
            
            <div class="style-select-wrapper">
                <button id="style-btn" class="btn" onclick="toggleStyleDropdown()">風格</button>
                <div id="style-dropdown" class="style-dropdown">
                    <div class="style-option" onclick="setTheme('shiang')">祥老師</div>
                    <div class="style-option" onclick="setTheme('maritime')">航海王</div>
                    <div class="style-option" onclick="setTheme('ai')">AI王</div>
                </div>
            </div>

            <input type="text" id="search-input" placeholder="搜尋..." oninput="filterButtons()">
        </div>

        <div class="nav-row mini-row" id="presets-row" style="display:none; border-top: 2px dashed #444; padding-top: 20px;">
            <div id="presets-list" style="display:contents"></div>
        </div>
        
        <div class="row-label">台美股市監控</div>
        <div class="nav-row" id="row-1">
            <div class="btn-wrapper" data-name="台股現貨"><input type="checkbox" class="split-chk" value="https://www.cmoney.tw/forum/stock"><button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/forum/stock')">台股現貨</button></div>
            <div class="btn-wrapper" data-name="台指期夜盤"><input type="checkbox" class="split-chk" value="https://www.cmoney.tw/forum/futures/TXF1?s=p"><button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/forum/futures/TXF1?s=p')">台指期夜盤</button></div>
            <div class="btn-wrapper" data-name="美股現貨"><input type="checkbox" class="split-chk" value="https://www.cmoney.tw/usfinance/ixic"><button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/usfinance/ixic')">美股現貨</button></div>
            <div class="btn-wrapper" data-name="美股期貨"><input type="checkbox" class="split-chk" value="https://www.cmoney.tw/usfinance/nq"><button class="btn" onclick="loadPage(this, 'https://www.cmoney.tw/usfinance/nq')">美股期貨</button></div>
        </div>

        <div class="row-label">航運、鐵礦石與能源</div>
        <div class="nav-row" id="row-2">
            <div class="btn-wrapper" data-name="歐線主連"><input type="checkbox" class="split-chk" value="https://quote.eastmoney.com/qihuo/ecm.html?jump_to_web=true"><button class="btn" onclick="loadPage(this, 'https://quote.eastmoney.com/qihuo/ecm.html?jump_to_web=true')">歐線主連</button></div>
            <div class="btn-wrapper" data-name="歐線次主連"><input type="checkbox" class="split-chk" value="https://quote.eastmoney.com/qihuo/ecs.html"><button class="btn" onclick="loadPage(this, 'https://quote.eastmoney.com/qihuo/ecs.html')">歐線次主連</button></div>
            <div class="btn-wrapper" data-name="鐵礦石主連"><input type="checkbox" class="split-chk" value="https://quote.eastmoney.com/qihuo/im.html?jump_to_web=true"><button class="btn" onclick="loadPage(this, 'https://quote.eastmoney.com/qihuo/im.html?jump_to_web=true')">鐵礦石主連</button></div>
            <div class="btn-wrapper" data-name="Braemar"><input type="checkbox" class="split-chk" value="https://www.braemarscreen.com/"><button class="btn" onclick="loadPage(this, 'https://www.braemarscreen.com/')">Braemar</button></div>
            <button class="btn ext" data-name="布蘭特原油" onclick="openExtPage('https://tw.tradingview.com/symbols/UKOIL/')">布蘭特原油 ↗</button>
            <button class="btn ext" data-name="荷姆茲海峽" onclick="openExtPage('https://www.marinetraffic.com/en/ais/home/centerx:56.4/centery:26.1/zoom:9')">荷姆茲海峽 ↗</button>
        </div>

        <div class="row-label">綜合數據與自訂</div>
        <div class="nav-row" id="row-3">
            <div class="btn-wrapper" data-name="BDI 指數"><input type="checkbox" class="split-chk" value="https://www.stockq.org/market/baltic_index.php"><button class="btn" onclick="loadPage(this, 'https://www.stockq.org/market/baltic_index.php')">BDI 指數</button></div>
            <div class="btn-wrapper" data-name="記憶體報價"><input type="checkbox" class="split-chk" value="https://www.trendforce.com.tw/price/dram/dram_spot"><button class="btn" onclick="loadPage(this, 'https://www.trendforce.com.tw/price/dram/dram_spot')">記憶體報價</button></div>
            <div class="btn-wrapper" data-name="美國經濟數據"><input type="checkbox" class="split-chk" value="eco-data.html"><button class="btn" onclick="loadPage(this, 'eco-data.html')">美國經濟數據</button></div>
            <button class="btn ext" data-name="貪婪指數" onclick="openExtPage('https://www.macromicro.me/charts/50108/cnn-fear-and-greed')">貪婪指數 ↗</button>
            <button class="btn ext" data-name="融資融卷" onclick="openExtPage('https://tw.stock.yahoo.com/margin-balance')">融資融卷 ↗</button>
            <button class="btn ext" data-name="即時新聞" onclick="openExtPage('https://news.cnyes.com/news/cat/headline')">即時新聞 ↗</button>
            <button class="btn ext" data-name="美股指標股" onclick="openExtPage('https://tw.tradingview.com/markets/stocks-usa/market-movers-large-cap/')">美股指標股 ↗</button>
            <button class="btn ext" data-name="台灣指標股" onclick="openExtPage('https://tw.tradingview.com/markets/stocks-taiwan/market-movers-large-cap/')">台灣指標股 ↗</button>
            <button class="btn ext" data-name="台股燈號" onclick="openExtPage('https://index.ndc.gov.tw/n/zh_tw')">台股燈號 ↗</button>
            <button class="btn ext" data-name="融資維持率" onclick="openExtPage('https://www.macromicro.me/charts/53117/taiwan-taiex-maintenance-margin')">融資維持率 ↗</button>
            <button class="btn ext" data-name="川普投顧" onclick="openExtPage('https://truthsocial.com/@realDonaldTrump')">川普投顧 ↗</button>
            <button class="btn ext" data-name="SCFI 指數" onclick="openExtPage('https://www.sse.net.cn/index/singleIndex?indexType=scfi')">SCFI 指數 ↗</button>
            <div id="custom-list" style="display:contents"></div>
        </div>
    </div>
    <div id="content"><iframe id="ifr"></iframe></div>
</div>

<script>
    const container = document.getElementById('container');
    const content = document.getElementById('content');
    let refreshConfigs = [];
    let wakeLock = null;

    function toggleStyleDropdown() {
        document.getElementById('style-dropdown').classList.toggle('show');
    }

    function setTheme(theme) {
        if (theme === 'maritime') { document.body.removeAttribute('data-theme'); } 
        else { document.body.setAttribute('data-theme', theme); }
        localStorage.setItem('user_theme', theme);
        document.getElementById('style-dropdown').classList.remove('show');
    }

    function initTheme() {
        const savedTheme = localStorage.getItem('user_theme') || 'maritime';
        setTheme(savedTheme);
    }

    window.onclick = function(event) {
        if (!event.target.matches('#style-btn')) {
            const dropdowns = document.getElementsByClassName("style-dropdown");
            for (let i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
            }
        }
    }

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { wakeLock = null; }); } } catch (err) {}
    }

    function clearAllTimers() { refreshConfigs.forEach(conf => { if (conf.timer) clearInterval(conf.timer); }); refreshConfigs = []; }
    function toggleNav() { container.classList.toggle('nav-hidden'); updateToggleText(); }
    function updateToggleText() { const b = document.getElementById('nav-toggle'); b.innerText = container.classList.contains('nav-hidden') ? '選單 🔽' : '選單 🔼'; }
    function goHome() { clearAllTimers(); container.classList.remove('active', 'nav-hidden'); updateToggleText(); content.classList.remove('split-grid'); content.innerHTML = ''; document.getElementById('nav').classList.remove('show-chks'); document.getElementById('apply-split').style.display = 'none'; document.querySelectorAll('.split-chk').forEach(c => c.checked = false); document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected')); if (activeExtWin && !activeExtWin.closed) activeExtWin.close(); activeExtWin = null; }

    function createViewElement(url, initialInterval = 0, initialScale = 1.0) {
        const wrapper = document.createElement('div'); wrapper.className = 'split-item';
        const controls = document.createElement('div'); controls.className = 'split-controls';
        const refBtn = createCtrlBtn('🔄', () => { ifr.src = url; });
        const autoBtn = createCtrlBtn('🕒', null);
        const zinBtn = createCtrlBtn('➕', () => updateZoom(0.1));
        const zoutBtn = createCtrlBtn('➖', () => updateZoom(-0.1));
        const zInfo = document.createElement('span'); zInfo.className = 'zoom-info'; zInfo.innerText = Math.round(initialScale * 100) + '%';
        const ifr = document.createElement('iframe'); ifr.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads allow-top-navigation-by-user-activation'); ifr.src = url;
        const myConf = { ifr, btn: autoBtn, interval: initialInterval, timer: null, url, scale: initialScale };
        refreshConfigs.push(myConf);
        const updateZoom = (delta) => { myConf.scale = Math.max(0.3, Math.min(2.0, Math.round((myConf.scale + delta) * 10) / 10)); ifr.style.width = (100 / myConf.scale) + '%'; ifr.style.height = (100 / myConf.scale) + '%'; ifr.style.transform = `scale(${myConf.scale})`; zInfo.innerText = Math.round(myConf.scale * 100) + '%'; };
        if (initialScale !== 1.0) updateZoom(0);
        const intervals = [0, 3000, 5000, 10000, 30000];
        const labels = ['🕒', '🕒 3s', '🕒 5s', '🕒 10s', '🕒 30s'];
        let idx = intervals.indexOf(initialInterval);
        if (idx === -1) idx = 0;
        const setupTimer = () => { if (myConf.timer) clearInterval(myConf.timer); autoBtn.innerHTML = labels[idx]; autoBtn.style.background = myConf.interval > 0 ? 'var(--accent)' : ''; if (myConf.interval > 0) { myConf.timer = setInterval(() => { ifr.src = ifr.src; }, myConf.interval); } };
        autoBtn.onclick = () => { idx = (idx + 1) % intervals.length; myConf.interval = intervals[idx]; setupTimer(); };
        if (initialInterval > 0) setupTimer();
        [refBtn, autoBtn, zinBtn, zoutBtn, zInfo].forEach(el => controls.appendChild(el));
        wrapper.appendChild(controls); wrapper.appendChild(ifr);
        return wrapper;
    }

    function createCtrlBtn(text, onClick) { const b = document.createElement('button'); b.className = 'ctrl-btn'; b.innerHTML = text; if (onClick) b.onclick = onClick; return b; }

    function loadPage(btn, url, interval = 0, scale = 1.0) {
        if (document.getElementById('nav').classList.contains('show-chks')) { const chk = btn.parentElement.querySelector('.split-chk'); if (chk) chk.checked = !chk.checked; return; }
        container.classList.add('active'); if (!container.classList.contains('nav-hidden')) container.classList.add('nav-hidden');
        updateToggleText(); content.classList.remove('split-grid'); content.innerHTML = ''; clearAllTimers();
        content.appendChild(createViewElement(url, interval, scale));
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected')); if (btn) btn.classList.add('selected');
        setTimeout(() => { const s = document.getElementById('search-input'); if (s.value) { s.value = ''; filterButtons(); } }, 300);
    }

    function toggleSplitMode() { const nav = document.getElementById('nav'); nav.classList.toggle('show-chks'); document.getElementById('apply-split').style.display = nav.classList.contains('show-chks') ? 'inline-block' : 'none'; }
    function startSplit(urls = null) {
        const selected = urls || Array.from(document.querySelectorAll('.split-chk:checked')).map(cb => cb.value);
        if (selected.length < 2) return alert("請至少選擇 2 個網頁");
        clearAllTimers(); content.innerHTML = ''; content.classList.add('split-grid'); container.classList.add('active', 'nav-hidden'); updateToggleText();
        const count = selected.length; const cols = count <= 2 ? count : (count <= 4 ? 2 : (count <= 6 ? 3 : 4)); const rows = Math.ceil(count / cols);
        content.style.gridTemplateColumns = `repeat(${cols}, 1fr)`; content.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        selected.forEach(u => { const val = typeof u === 'string' ? u : u.url; content.appendChild(createViewElement(val, u.interval || 0, u.scale || 1.0)); });
        if (!urls) toggleSplitMode();
    }

    function saveCurrentLayout() {
        if (!container.classList.contains('active')) return alert("請先開啟網頁");
        const name = prompt("配置名稱：", "我的配置 " + new Date().toLocaleTimeString());
        if (!name) return;
        const preset = { name, isSplit: content.classList.contains('split-grid'), views: refreshConfigs.map(c => ({ url: c.url, interval: c.interval, scale: c.scale })) };
        const presets = JSON.parse(localStorage.getItem('user_presets') || "[]"); presets.push(preset); localStorage.setItem('user_presets', JSON.stringify(presets)); renderPresets();
    }

    let isManageMode = false;
    function toggleManageMode() { isManageMode = !isManageMode; document.body.classList.toggle('manage-mode', isManageMode); document.getElementById('manage-btn').innerText = isManageMode ? '✅ 完成' : '管理'; renderPresets(); renderCustomBtns(); }

    function renderPresets() {
        const row = document.getElementById('presets-row'); const list = document.getElementById('presets-list'); const presets = JSON.parse(localStorage.getItem('user_presets') || "[]");
        if (presets.length === 0) { row.style.display = 'none'; return; } row.style.display = 'grid'; list.innerHTML = '';
        presets.forEach((p, i) => { const wrapper = document.createElement('div'); wrapper.className = 'btn-wrapper'; const btn = document.createElement('button'); btn.className = 'btn'; btn.style.background = '#4834d4'; btn.innerText = p.name; btn.onclick = () => { if (isManageMode) return; p.isSplit ? startSplit(p.views) : loadPage(null, p.views[0].url, p.views[0].interval, p.views[0].scale); }; const del = document.createElement('div'); del.className = 'del-badge'; del.innerText = '×'; del.onclick = (e) => { e.stopPropagation(); if (confirm(`刪除「${p.name}」？`)) { presets.splice(i, 1); localStorage.setItem('user_presets', JSON.stringify(presets)); renderPresets(); } }; wrapper.appendChild(btn); wrapper.appendChild(del); list.appendChild(wrapper); });
    }

    function updateClock() { const now = new Date(); document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0'); }
    setInterval(updateClock, 1000); updateClock();

    function filterButtons() { const term = document.getElementById('search-input').value.toLowerCase(); document.querySelectorAll('.btn-wrapper, .btn.ext').forEach(el => { const name = el.getAttribute('data-name') || el.innerText; el.style.display = name.toLowerCase().includes(term) ? '' : 'none'; }); }

    function addBtn() { const name = prompt("名稱："); const url = prompt("網址：", "https://"); if (!name || !url) return; const isExt = confirm("另開新視窗？"); const btns = JSON.parse(localStorage.getItem('user_btns') || "[]"); btns.push({name, url, isExt}); localStorage.setItem('user_btns', JSON.stringify(btns)); renderCustomBtns(); }

    function renderCustomBtns() {
        const list = document.getElementById('custom-list'); list.innerHTML = ''; const btns = JSON.parse(localStorage.getItem('user_btns') || "[]");
        btns.forEach((b, i) => { const wrapper = document.createElement('div'); wrapper.className = 'btn-wrapper'; wrapper.setAttribute('data-name', b.name); const chk = document.createElement('input'); chk.type = 'checkbox'; chk.className = 'split-chk'; chk.value = b.url; const btn = document.createElement('button'); btn.className = 'btn' + (b.isExt ? ' ext' : ''); btn.innerText = b.name + (b.isExt ? " ↗" : ""); btn.onclick = () => { if (isManageMode) return; b.isExt ? openExtPage(b.url) : loadPage(btn, b.url); }; const del = document.createElement('div'); del.className = 'del-badge'; del.innerText = '×'; del.onclick = (e) => { e.stopPropagation(); if (confirm(`刪除「${b.name}」？`)) { btns.splice(i, 1); localStorage.setItem('user_btns', JSON.stringify(btns)); renderCustomBtns(); } }; wrapper.appendChild(chk); wrapper.appendChild(btn); wrapper.appendChild(del); list.appendChild(wrapper); });
        filterButtons();
    }

    let activeExtWin = null;
    function openExtPage(url) { activeExtWin = window.open(url, '_blank'); }

    document.addEventListener('visibilitychange', async () => { if (document.visibilityState === 'hidden') { refreshConfigs.forEach(conf => { if (conf.timer) { clearInterval(conf.timer); conf.timer = null; } }); } else { refreshConfigs.forEach(conf => { if (conf.interval > 0) { conf.ifr.src = conf.ifr.src; conf.timer = setInterval(() => { conf.ifr.src = conf.ifr.src; }, conf.interval); } }); if (wakeLock !== null) await requestWakeLock(); } });
    document.addEventListener('click', () => { if (!wakeLock) requestWakeLock(); }, { once: true });

    const navToggle = document.getElementById('nav-toggle'); let isDragging = false, startX, startY, initialX, initialY;
    function initNavPos() { try { const p = JSON.parse(localStorage.getItem('nav_btn_pos')); if (p) { const l = parseFloat(p.left), t = parseFloat(p.top); if (l > 0 && l < window.innerWidth && t > 0 && t < window.innerHeight) { navToggle.style.left = p.left; navToggle.style.top = p.top; navToggle.style.right = 'auto'; } } } catch(e) {} }
    navToggle.onpointerdown = (e) => { isDragging = false; startX = e.clientX; startY = e.clientY; const r = navToggle.getBoundingClientRect(); initialX = r.left; initialY = r.top; navToggle.setPointerCapture(e.pointerId); navToggle.style.transition = 'none'; };
    navToggle.onpointermove = (e) => { if (e.buttons === 0) return; const dx = e.clientX - startX, dy = e.clientY - startY; if (Math.abs(dx) > 5 || Math.abs(dy) > 5) { isDragging = true; navToggle.style.left = (initialX + dx) + 'px'; navToggle.style.top = (initialY + dy) + 'px'; navToggle.style.right = 'auto'; } };
    navToggle.onpointerup = (e) => { navToggle.releasePointerCapture(e.pointerId); navToggle.style.transition = '0.3s'; if (!isDragging) toggleNav(); else localStorage.setItem('nav_btn_pos', JSON.stringify({ left: navToggle.style.left, top: navToggle.style.top })); };

    initTheme();
    initNavPos(); renderCustomBtns(); renderPresets();
</script>
</body>
</html>
