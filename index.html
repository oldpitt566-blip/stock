onst nT=document.getElementById('nav-toggle');let iD=!1,sX,sY,iX,iY;function iNP(){try{const p=JSON.parse(localStorage.getItem('nav_btn_pos'));if(p){nT.style.left=p.left;nT.style.top=p.top;nT.style.right='auto'}}catch(e){}}nT.onpointerdown=e=>{iD=!1;sX=e.clientX;sY=e.clientY;const r=nT.getBoundingClientRect();iX=r.left;iY=r.top;nT.setPointerCapture(e.pointerId);nT.style.transition='none'};nT.onpointermove=e=>{if(0!==e.buttons){const dx=e.clientX-sX,dy=e.clientY-sY;(Math.abs(dx)>5||Math.abs(dy)>5)&&(iD=!0,nT.style.left=iX+dx+'px',nT.style.top=iY+dy+'px',nT.style.right='auto')}};nT.onpointerup=e=>{nT.releasePointerCapture(e.pointerId);nT.style.transition='0.3s';iD?localStorage.setItem('nav_btn_pos',JSON.stringify({left:nT.style.left,top:nT.style.top})):toggleNav()};initTheme();renderAllRows();renderPresets();iNP();</script></body></html>
