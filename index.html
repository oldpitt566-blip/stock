<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>祥老師投資戰情室 - 核心功能全修復版</title>
    <style>
        :root {
            --primary: #006241; --accent: #e60012;  
            --bg-nav: rgba(10, 25, 20, 0.85); 
            --btn-bg: rgba(0, 98, 65, 0.4);
            --text: #ffffff; --gold: #f1c40f; --glow: #00d2ad;
            --bg-img: url('sea.png'); --btn-gradient: none;
            --ani-speed: 0s; --bullish: #00FF00; --bearish: #FF3B30;
        }
        [data-theme="shiang"] {
            --primary: #fff; --accent: #fff; --bg-nav: rgba(15, 15, 15, 0.9); 
            --btn-bg: rgba(45, 45, 45, 0.8); --text: #fff; --gold: #fff; 
            --glow: rgba(255, 255, 255, 0.3); --bg-img: url('hsiang.png'); 
            --btn-gradient: linear-gradient(transparent, transparent);
        }
        [data-theme="ai"] {
            --primary: #6c5ce7; --accent: #00d2ff; --bg-nav: rgba(10, 10, 35, 0.85); 
            --btn-bg: rgba(40, 40, 80, 0.6); --text: #fff; --gold: #00d2ff; 
            --glow: #a29bfe; --bg-img: url('tsmc.png'); 
            --btn-gradient: linear-gradient(135deg, #6c5ce7, #00d2ff, #6c5ce7);
            --ani-speed: 3s;
        }

        body, html { 
            margin: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; 
            color: var(--text); background-color: #000;
            background: var(--bg-img) no-repeat center center fixed; background-size: cover;
            transition: background 0.8s ease; 
        }
        
        #container { display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        .ticker-wrap { 
            width: 100%; height: 40px; background: #000; border-bottom: 1px solid rgba(255,255,255,0.15); 
            z-index: 35000; position: fixed; top: 0; left: 0; 
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        #container.hide-ticker .ticker-wrap { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        #nav { 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            position: absolute; top: 40px; left: 0; width: 100%; height: calc(100% - 40px);
            padding: 20px 20px 40px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-nav); z-index: 25000; overflow-y: auto; box-sizing: border-box;
            border-bottom: 5px solid var(--primary);
        }
        #container.nav-hidden #nav { transform: translateY(-110%); }

        #nav-toggle {
            position: fixed; right: 15px; top: 55px; z-index: 30000;
            background: var(--primary); color: #fff; border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px; border-radius: 4px; cursor: pointer;
            font-size: 0.9rem; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: 0.3s; letter-spacing: 2px; touch-action: none;
        }
        [data-theme="shiang"] #nav-toggle { background: #fff !important; color: #000 !important; border: 1px solid #000; }

        #content { position: absolute; top: 40px; left: 0; width: 100%; height: calc(100% - 40px); display: none; background: #000; z-index: 1; transition: all 0.4s ease; }
        #container.active #content { display: block; }
        #container.active #content.split-grid { display: grid; gap: 5px; padding: 5px; box-sizing: border-box; }
        #container.hide-ticker #content { top: 0; height: 100%; }

        #clock { font-family: monospace; font-size: 1.4rem; color: #ffffff; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,1); display: block; min-width: 120px; text-align: center; }

        .btn, #search-input { 
            padding: 15px 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
            background: var(--btn-bg); 
            background-image: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.6) 100%), var(--btn-gradient);
            background-size: 100% 100%, 200% 200%;
            color: #fff; font-weight: 700; font-size: 1.3rem; 
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            text-align: center; width: 100%; box-sizing: border-box; min-height: 85px;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05); border-bottom: 4px solid rgba(0,0,0,0.4);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .btn:hover, #search-input:focus { filter: brightness(1.2); transform: translateY(-3px); border-bottom-color: var(--accent); outline: none; }
        .btn.selected { background: var(--primary) !important; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        .btn.split-selected { background: var(--accent) !important; box-shadow: 0 0 20px var(--accent); transform: scale(0.98); }

        .nav-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; margin: 0 auto 25px; }
        .mini-row { display: flex; gap: 10px; width: 100%; max-width: 1200px; margin: 0 auto 25px; justify-content: space-between; align-items: stretch; }
        .mini-row > * { flex: 1; min-width: 0; }

        .mini-row .btn, #search-input, .style-select-wrapper, #clock-wrapper { 
            min-height: 50px !important; height: 50px !important; 
            font-size: 1.1rem; padding: 0 10px; display: flex; align-items: center; justify-content: center;
        }
        #search-input::placeholder { color: rgba(255,255,255,0.6); }

        .style-select-wrapper { position: relative; display: flex; width: 100%; padding: 0 !important; }
        #style-dropdown { 
            position: absolute; top: 50px; left: 0; width: 100%; background: #1a1a2e; 
            border: 1px solid #444; border-radius: 4px; display: none; z-index: 50000; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.9); overflow: hidden;
        }
        #style-dropdown.show { display: block !important; }
        .style-option { padding: 15px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #333; color: #fff; text-align: center; }
        .style-option:hover { background: var(--primary); }

        /* 數據儀表板樣式 */
        #home-dashboard { 
            position: absolute; top: 40px; left: 0; width: 100%; height: calc(100% - 40px); 
            z-index: 10; pointer-events: none; transition: 0.4s ease; 
            display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(25px);
        }
        #container.show-dashboard #home-dashboard { display: flex; pointer-events: auto; }
        #container.hide-ticker #home-dashboard { top: 0; height: 100%; padding-top: 40px; }
        .dashboard-main { width: 100%; max-width: 1000px; height: 100%; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-bottom: 40px; }

        #dashboard-grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; }
        .widget-box { height: 110px; background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .widget-box:hover { border-color: var(--accent); transform: scale(1.02); background: rgba(255,255,255,0.05); }
        .widget-box iframe { filter: brightness(1.5) contrast(1.1); width: 100%; height: 100%; border: none; pointer-events: none; transform: scale(1.05); }

        #w-datetime { flex-direction: column; gap: 5px; cursor: default; }
        #dash-date { font-size: 1.1rem; font-weight: 700; text-shadow: 0 2px 8px #000; color: #fff; }
        #dash-time { font-size: 2.2rem; font-weight: 900; text-shadow: 0 2px 10px #000; font-family: monospace; color: #fff; }

        /* 分割視窗控制列樣式 */
        .split-item { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; border: 1px solid #333; }
        .split-item iframe { background: #fff; border: none; position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        .split-controls { 
            position: absolute; top: 10px; left: 10px; z-index: 20000; display: flex; gap: 5px; 
            background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; border: 1px solid var(--primary); 
        }
        .ctrl-btn { 
            background: var(--primary); color: #fff; border: 1px solid rgba(255,255,255,0.3); 
            width: 40px; height: 35px; cursor: pointer; font-size: 18px; font-weight: 700; 
            display: flex; align-items: center; justify-content: center;
        }
        .zoom-info { 
            background: rgba(0,0,0,0.7); color: #ffffff; height: 35px; padding: 0 8px; 
            border-radius: 4px; font-size: 13px; font-weight: 700; display: flex; 
            align-items: center; justify-content: center; text-shadow: 0 1px 2px #000; 
        }

        .row-label { text-align: left; max-width: 1200px; margin: 0 auto 12px; font-weight: 900; font-size: 1.2rem; padding-left: 15px; border-left: 6px solid var(--primary); text-transform: uppercase; }
        
        .btn-wrapper { position: relative; width: 100%; }
        .del-badge { position: absolute; top: -10px; right: -10px; background: var(--accent); color: #fff; width: 32px; height: 32px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; cursor: pointer; border: 2px solid #fff; z-index: 100; }
        body.manage-mode .del-badge { display: flex; }
        @keyframes shake { 0% { transform: rotate(0deg) } 25% { transform: rotate(1deg) } 75% { transform: rotate(-1deg) } 100% { transform: rotate(0deg) } }
        body.manage-mode .btn-wrapper:not(.dragging) .btn { animation: shake 0.3s infinite; pointer-events: none; }

        @media (max-width: 768px) { 
            #dashboard-grid-container { grid-template-columns: repeat(2, 1fr) !important; gap: 10px; } 
            #dash-time { font-size: 1.8rem; } 
            .widget-box { height: 125px; } 
            .mini-row { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 10px; height: auto !important; }
            .mini-row > * { width: 100%; height: 50px !important; }
            #clock-wrapper, #search-input { grid-column: span 2; }
            .nav-row:not(.mini-row) { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div id="container" class="nav-hidden">
        <div class="ticker-wrap">
            <div class="tradingview-widget-container">
                <script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
                {"symbols":[{"proName":"DJI","title":"道瓊"},{"proName":"SPX500","title":"S&P 500"},{"proName":"NSXUSD","title":"Nasdaq 100"},{"proName":"FX_IDC:USDTWD","title":"美金/台幣"},{"proName":"NYSE:TSM","title":"台積ADR"},{"proName":"INDEX:BDI","title":"BDI"},{"proName":"VIX","title":"VIX"},{"proName":"BITSTAMP:BTCUSD","title":"比特幣"},{"proName":"TVC:UKOIL","title":"原油"},{"proName":"TVC:GOLD","title":"黃金"}],"showSymbolLogo":true,"colorTheme":"dark","isTransparent":true,"displayMode":"regular","locale":"zh_TW"}
                </script>
            </div>
        </div>

        <div id="home-dashboard">
            <div class="dashboard-main">
                <div id="dashboard-grid-container">
                    <div class="widget-box" id="w-datetime">
                        <div id="dash-date">----/--/-- ---</div>
                        <div id="dash-time">00:00:00</div>
                    </div>
                    <div class="widget-box" id="w-tsm" onclick="loadDashboardPage('tsm')"></div>
                    <div class="widget-box" id="w-dji" onclick="loadDashboardPage('dji')"></div>
                    <div class="widget-box" id="w-spx" onclick="loadDashboardPage('spx')"></div>
                    <div class="widget-box" id="w-ixic" onclick="loadDashboardPage('ixic')"></div>
                    <div class="widget-box" id="vix" onclick="loadDashboardPage('vix')"></div>
                    <div class="widget-box" id="btc" onclick="loadDashboardPage('btc')"></div>
                    <div class="widget-box" id="oil" onclick="loadDashboardPage('oil')"></div>
                    <div class="widget-box" id="gold" onclick="loadDashboardPage('gold')"></div>
                    <div class="widget-box" id="twd" onclick="loadDashboardPage('twd')"></div>
                </div>
            </div>
        </div>

        <button id="nav-toggle">選單 🔽</button>
        <div id="nav">
            <div id="welcome-text"><h1 onclick="goHome()">祥老師戰情室</h1><p>監控即時行情，衝刺獲利</p></div>
            <div class="nav-row mini-row">
                <div id="clock-wrapper"><div id="clock"></div></div>
                <button id="btn-dash" class="btn" style="border-left: 4px solid var(--gold);" onclick="showDashboard()">儀表板</button>
                <button id="btn-split" class="btn" onclick="toggleSplitMode()">分割</button>
                <button id="apply-split" class="btn" style="display:none; background:var(--accent);" onclick="startSplit()">開始分割</button>
                <button id="btn-add" class="btn" onclick="addBtn()">新增</button>
                <button id="btn-save" class="btn" onclick="saveCurrentLayout()">儲存</button>
                <button id="manage-btn" class="btn" onclick="toggleManageMode()">管理</button>
                <div class="style-select-wrapper">
                    <button id="style-btn" class="btn">風格</button>
                    <div id="style-dropdown"><div class="style-option" onclick="setTheme('shiang')">祥老師</div><div class="style-option" onclick="setTheme('maritime')">航海王</div><div class="style-option" onclick="setTheme('ai')">AI王</div></div>
                </div>
                <input type="text" id="search-input" placeholder="搜尋..." oninput="filterButtons()">
            </div>
            <div class="nav-row mini-row" id="presets-row" style="display:none; border-top:1px dashed #444; padding-top:10px;"><div id="presets-list" style="display:contents"></div></div>
            <div class="row-label">台美股市監控</div><div class="nav-row draggable-row" id="row-1"></div>
            <div class="row-label">航運、鐵礦石與能源</div><div class="nav-row draggable-row" id="row-2"></div>
            <div class="row-label">綜合數據與自訂</div><div class="nav-row draggable-row" id="row-3"></div>
        </div>
        <div id="content"></div>
    </div>

    <script>
        const globalContainer = document.getElementById('container'), globalContent = document.getElementById('content');
        let refreshConfigs = [], wakeLock = null, isManageMode = false, fmTimer = null;

        const defaultBtns = {
            "row-1": [{name:"台股現貨", url:"https://www.cmoney.tw/forum/stock"},{name:"台指期夜盤", url:"https://www.cmoney.tw/forum/futures/TXF1?s=p"},{name:"美股現貨", url:"https://www.cmoney.tw/usfinance/ixic"},{name:"美股期貨", url:"https://www.cmoney.tw/usfinance/nq"}],
            "row-2": [{name:"歐線主連", url:"https://quote.eastmoney.com/qihuo/ecm.html?jump_to_web=true"},{name:"歐線次主連", url:"https://quote.eastmoney.com/qihuo/ecs.html"},{name:"鐵礦石主連", url:"https://quote.eastmoney.com/qihuo/im.html?jump_to_web=true"},{name:"Braemar", url:"https://www.braemarscreen.com/"},{name:"布蘭特原油", url:"https://tw.tradingview.com/symbols/UKOIL/", isExt:true},{name:"荷姆茲海峽", url:"https://www.marinetraffic.com/en/ais/home/centerx:56.4/centery:26.1/zoom:9", isExt:true}],
            "row-3": [{name:"BDI 指數", url:"https://www.stockq.org/market/baltic_index.php"},{name:"記憶體報價", url:"https://www.trendforce.com.tw/price/dram/dram_spot"},{name:"美國經濟數據", url:"eco-data.html"},{name:"貪婪指數", url:"https://www.macromicro.me/charts/50108/cnn-fear-and-greed", isExt:true},{name:"融資融卷", url:"https://tw.stock.yahoo.com/margin-balance", isExt:true},{name:"即時新聞", url:"https://news.cnyes.com/news/cat/headline", isExt:true},{name:"美股指標股", url:"https://tw.tradingview.com/markets/stocks-usa/market-movers-large-cap/", isExt:true},{name:"台灣指標股", url:"https://tw.tradingview.com/markets/stocks-taiwan/market-movers-large-cap/", isExt:true},{name:"台股燈號", url:"https://index.ndc.gov.tw/n/zh_tw", isExt:true},{name:"融資維持率", url:"https://www.macromicro.me/charts/53117/taiwan-taiex-maintenance-margin", isExt:true},{name:"川普投顧", url:"https://truthsocial.com/@realDonaldTrump", isExt:true},{name:"比特幣", url:"https://tw.tradingview.com/symbols/BTCUSD/", isExt:true},{name:"SCFI 指數", url:"https://www.sse.net.cn/index/singleIndex?indexType=scfi", isExt:true},{name:"產業鏈查詢", url:"ai-chain.html"}]
        };

        async function requestWakeLock() { if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} } }
        function releaseWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock = null; } }

        function filterButtons() { 
            const t = document.getElementById('search-input').value.toLowerCase(); 
            document.querySelectorAll('.btn-wrapper').forEach(el => { 
                const name = el.getAttribute('data-name'); 
                if (name) el.style.display = name.toLowerCase().includes(t) ? '' : 'none'; 
            }); 
        }

        function updateClock() { 
            const n = new Date(); const timeStr = n.getHours().toString().padStart(2, '0') + ":" + n.getMinutes().toString().padStart(2, '0') + ":" + n.getSeconds().toString().padStart(2, '0');
            const clockEl = document.getElementById('clock'), dashTime = document.getElementById('dash-time'), dashDate = document.getElementById('dash-date');
            if (clockEl) clockEl.innerText = timeStr; if (dashTime) dashTime.innerText = timeStr;
            if (dashDate) { const y = n.getFullYear(), mo = (n.getMonth() + 1).toString().padStart(2, '0'), d = n.getDate().toString().padStart(2, '0'), days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六']; dashDate.innerText = `${y}/${mo}/${d} ${days[n.getDay()]}`; }
        }
        setInterval(updateClock, 1000);

        function setTheme(t) { if (t === 'maritime') document.body.removeAttribute('data-theme'); else document.body.setAttribute('data-theme', t); localStorage.setItem('user_theme', t); document.getElementById('style-dropdown').classList.remove('show'); if (globalContainer.classList.contains('show-dashboard')) updateWidgets(); }
        function initTheme() { setTheme(localStorage.getItem('user_theme') || 'maritime'); }

        function showDashboard() { globalContainer.classList.remove('active'); globalContainer.classList.add('show-dashboard', 'nav-hidden', 'hide-ticker'); updateToggleText(); updateWidgets(); requestWakeLock(); }

        function updateWidgets() {
            const symbols = { 'w-tsm':'TSM', 'w-dji':'DJI', 'w-spx':'SPX500', 'w-ixic':'NSXUSD', 'vix':'VIX', 'btc':'BTCUSD', 'oil':'UKOIL', 'gold':'GOLD', 'twd':'USDTWD' };
            for (const [id, sym] of Object.entries(symbols)) {
                const el = document.getElementById(id); if (!el) continue; el.innerHTML = '';
                const s = document.createElement('script'); s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js'; s.async = true;
                s.innerHTML = JSON.stringify({ "symbol":sym, "width":"100%", "colorTheme":"dark", "isTransparent":true, "locale":"zh_TW" });
                el.appendChild(s);
            }
        }

        // 核心建立視窗函式：包含控制列
        function createViewElement(u, iS=1.0) {
            const w = document.createElement('div'); w.className = 'split-item';
            const ctrl = document.createElement('div'); ctrl.className = 'split-controls';
            const ifr = document.createElement('iframe'); 
            ifr.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads allow-top-navigation-by-user-activation'); 
            ifr.src = u; ifr.style.width='100%'; ifr.style.height='100%'; 
            
            const zI = document.createElement('span'); zI.className = 'zoom-info'; zI.innerText = Math.round(100*iS)+'%';
            const myC = { ifr, scale: iS, url: u }; refreshConfigs.push(myC);
            
            const uZ = (d) => { 
                myC.scale = Math.max(.3, Math.min(2.0, Math.round(10*(myC.scale+d))/10)); 
                ifr.style.width = 100/myC.scale+'%'; ifr.style.height = 100/myC.scale+'%'; 
                ifr.style.transform = `scale(${myC.scale})`; zI.innerText = Math.round(100*myC.scale)+'%'; 
            };
            if (iS !== 1.0) uZ(0);

            const rB = createCtrlBtn('🔄', () => { ifr.src = u; });
            const ziB = createCtrlBtn('➕', () => uZ(.1)); 
            const zoB = createCtrlBtn('➖', () => uZ(-.1));
            
            [rB, ziB, zoB, zI].forEach(el => ctrl.appendChild(el));
            w.appendChild(ctrl); w.appendChild(ifr); return w;
        }
        function createCtrlBtn(t, o) { const b = document.createElement('button'); b.className = 'ctrl-btn'; b.innerHTML = t; if (o) b.onclick = o; return b; }

        function loadPage(b, u, iS=1.0) {
            if (document.getElementById('nav').classList.contains('show-chks')) { if (b) b.classList.toggle('split-selected'); return; }
            releaseWakeLock(); globalContainer.classList.remove('show-dashboard', 'hide-ticker'); globalContainer.classList.add('active', 'nav-hidden'); 
            globalContent.innerHTML = ''; refreshConfigs = []; globalContent.classList.remove('split-grid');
            globalContent.appendChild(createViewElement(u, iS));
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('selected', 'split-selected')); if (b) b.classList.add('selected');
        }

        function toggleSplitMode() { const n = document.getElementById('nav'); n.classList.toggle('show-chks'); document.getElementById('apply-split').style.display = n.classList.contains('show-chks') ? 'inline-block' : 'none'; document.querySelectorAll('.btn').forEach(b => b.classList.remove('split-selected')); }
        function startSplit(urls = null) {
            let s = []; if (urls) s = urls; else { document.querySelectorAll('.btn.split-selected').forEach(btn => { const raw = btn.closest('.btn-wrapper').getAttribute('data-raw'); if(raw) s.push(JSON.parse(raw)); }); }
            if (s.length < 2) return alert("請選擇 2 個以上網頁");
            releaseWakeLock(); globalContent.innerHTML = ''; refreshConfigs = []; globalContent.classList.add('split-grid'); globalContainer.classList.remove('show-dashboard', 'hide-ticker'); globalContainer.classList.add('active', 'nav-hidden'); updateToggleText();
            const count = s.length, cols = count <= 2 ? count : (count <= 4 ? 2 : 3), rows = Math.ceil(count / cols);
            globalContent.style.gridTemplateColumns = `repeat(${cols}, 1fr)`; globalContent.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            s.forEach(item => globalContent.appendChild(createViewElement(item.url, item.scale || 1.0)));
            if(!urls) toggleSplitMode();
        }

        function loadDashboardPage(type) { const maps = { 'tsm': 'https://www.cmoney.tw/usfinance/ixic', 'dji': 'https://www.cmoney.tw/usfinance/ixic', 'spx': 'https://www.cmoney.tw/usfinance/ixic', 'ixic': 'https://www.cmoney.tw/usfinance/ixic', 'vix': 'https://www.macromicro.me/charts/50108/cnn-fear-and-greed', 'btc': 'https://tw.tradingview.com/symbols/BTCUSD/', 'oil': 'https://tw.tradingview.com/symbols/UKOIL/', 'gold': 'https://tw.tradingview.com/symbols/GOLD/', 'twd': 'eco-data.html' }; if(maps[type]) loadPage(null, maps[type]); }
        function saveCurrentLayout() { if (!globalContainer.classList.contains('active')) return alert("請先開啟網頁再儲存"); const n = prompt("配置名稱：", "我的配置 " + new Date().toLocaleTimeString()); if (!n) return; const p = { name: n, isSplit: globalContent.classList.contains('split-grid'), views: refreshConfigs.map(c => ({ url: c.url, scale: c.scale })) }; const ps = JSON.parse(localStorage.getItem('user_presets') || "[]"); ps.push(p); localStorage.setItem('user_presets', JSON.stringify(ps)); renderPresets(); }
        function renderPresets() { const row = document.getElementById('presets-row'), list = document.getElementById('presets-list'), ps = JSON.parse(localStorage.getItem('user_presets') || "[]"); if (ps.length === 0) { row.style.display = 'none'; return; } row.style.display = 'grid'; list.innerHTML = ''; ps.forEach((p, i) => { const w = document.createElement('div'); w.className = 'btn-wrapper'; const btn = document.createElement('button'); btn.className = 'btn'; btn.style.background = '#4834d4'; btn.innerText = p.name; btn.onclick = () => { if (isManageMode) return; if(p.isSplit) { startSplit(p.views); } else { loadPage(null, p.views[0].url, p.views[0].scale); } }; const del = document.createElement('div'); del.className = 'del-badge'; del.innerText = '×'; del.onclick = (e) => { e.stopPropagation(); if (confirm(`刪除配置「${p.name}」？`)) { ps.splice(i, 1); localStorage.setItem('user_presets', JSON.stringify(ps)); renderPresets(); } }; w.appendChild(btn); w.appendChild(del); list.appendChild(w); }); }

        function addBtn() { const n = prompt("名稱："), u = prompt("網址：", "https://"); if (n && u) { const iE = confirm("是否另開？"), btns = JSON.parse(localStorage.getItem('user_btns') || "[]"); btns.push({ name: n, url: u, isExt: iE, custom: true }); localStorage.setItem('user_btns', JSON.stringify(btns)); renderAllRows(); } }
        function toggleManageMode() { isManageMode = !isManageMode; document.body.classList.toggle('manage-mode', isManageMode); document.getElementById('manage-btn').innerText = isManageMode ? '✅ 完成' : '管理'; renderAllRows(); renderPresets(); }

        function saveAllOrders() { const allData = {}; ["row-1", "row-2", "row-3"].forEach(rId => { const ws = Array.from(document.querySelectorAll("#" + rId + " .btn-wrapper")); allData[rId] = ws.map(w => JSON.parse(w.getAttribute('data-raw'))); }); localStorage.setItem('user_layout', JSON.stringify(allData)); }
        function addDL(el) {
            el.addEventListener('dragstart', e => { if (!isManageMode) return; dragSrcEl = el; el.classList.add('dragging'); });
            el.addEventListener('dragover', e => { if (e.preventDefault) e.preventDefault(); return false; });
            el.addEventListener('drop', e => { if (e.stopPropagation) e.stopPropagation(); if (dragSrcEl !== el && dragSrcEl.parentNode === el.parentNode) { const row = el.parentNode; const ws = Array.from(row.children); if (ws.indexOf(dragSrcEl) < ws.indexOf(el)) row.insertBefore(dragSrcEl, el.nextSibling); else row.insertBefore(dragSrcEl, el); saveAllOrders(); } return false; });
            el.addEventListener('dragend', () => { el.classList.remove('dragging'); });
            el.addEventListener('touchstart', e => { if (!isManageMode) return; dragSrcEl = el; el.classList.add('dragging'); }, { passive: true });
            el.addEventListener('touchmove', e => { if (!isManageMode || !dragSrcEl) return; const t = e.touches[0], target = document.elementFromPoint(t.clientX, t.clientY), w = target ? target.closest('.btn-wrapper') : null; if (w && w !== dragSrcEl && w.parentNode === dragSrcEl.parentNode) { const row = w.parentNode; if (t.clientY > w.getBoundingClientRect().top + w.offsetHeight / 2) row.insertBefore(dragSrcEl, w.nextSibling); else row.insertBefore(dragSrcEl, w); } }, { passive: true });
            el.addEventListener('touchend', () => { if (dragSrcEl) { dragSrcEl.classList.remove('dragging'); saveAllOrders(); dragSrcEl = null; } });
        }

        function renderAllRows() {
            const saved = JSON.parse(localStorage.getItem('user_layout') || JSON.stringify(defaultBtns)), custom = JSON.parse(localStorage.getItem('user_btns') || "[]");
            ["row-1", "row-2", "row-3"].forEach(rId => {
                const row = document.getElementById(rId); if(!row) return; row.innerHTML = '';
                let data = saved[rId] || []; if (rId === "row-3") custom.forEach(cb => { if (!data.find(db => db.name === cb.name)) data.push(cb) });
                data.forEach(b => {
                    const w = document.createElement('div'); w.className = 'btn-wrapper'; w.setAttribute('data-name', b.name); w.setAttribute('data-raw', JSON.stringify(b)); w.setAttribute('draggable', isManageMode); addDL(w);
                    const btn = document.createElement('button'); btn.className = 'btn'; btn.innerText = b.name + (b.isExt ? " ↗" : "");
                    btn.onclick = () => { if (isManageMode) return; b.isExt ? window.open(b.url, '_blank') : loadPage(btn, b.url); };
                    const del = document.createElement('div'); del.className = 'del-badge'; del.innerText = '×';
                    del.onclick = (e) => { e.stopPropagation(); if (confirm(`刪除「${b.name}」？`)) { let cur = JSON.parse(localStorage.getItem('user_btns') || "[]").filter(i => i.name !== b.name); localStorage.setItem('user_btns', JSON.stringify(cur)); let lay = JSON.parse(localStorage.getItem('user_layout') || "{}"); if (lay[rId]) lay[rId] = lay[rId].filter(i => i.name !== b.name); localStorage.setItem('user_layout', JSON.stringify(lay)); renderAllRows(); } };
                    w.appendChild(btn); if (b.custom) w.appendChild(del); row.appendChild(w);
                })
            });
        }

        const nT = document.getElementById('nav-toggle'); let iD = false, sX, sY, iX, iY;
        function iNP() { try { const p = JSON.parse(localStorage.getItem('nav_btn_pos')); if (p) { nT.style.left = p.left; nT.style.top = p.top; nT.style.right = 'auto'; } } catch (e) {} }
        nT.onpointerdown = e => { iD = false; sX = e.clientX; sY = e.clientY; const r = nT.getBoundingClientRect(); iX = r.left; iY = r.top; nT.setPointerCapture(e.pointerId); nT.style.transition = 'none'; };
        nT.onpointermove = e => { if (e.buttons !== 0) { const dx = e.clientX - sX, dy = e.clientY - sY; if (Math.abs(dx) > 5 || Math.abs(dy) > 5) { iD = true; nT.style.left = iX + dx + 'px'; nT.style.top = iY + dy + 'px'; nT.style.right = 'auto'; } } };
        nT.onpointerup = e => { nT.releasePointerCapture(e.pointerId); nT.style.transition = '0.3s'; if (iD) localStorage.setItem('nav_btn_pos', JSON.stringify({ left: nT.style.left, top: nT.style.top })); else globalContainer.classList.toggle('nav-hidden'); updateToggleText(); };

        function goHome() { releaseWakeLock(); globalContainer.classList.remove('active', 'show-dashboard', 'hide-ticker'); globalContainer.classList.add('nav-hidden'); updateToggleText(); globalContent.innerHTML = ''; globalContent.classList.remove('split-grid'); }
        function updateToggleText() { document.getElementById('nav-toggle').innerText = globalContainer.classList.contains('nav-hidden') ? '選單 🔽' : '選單 🔼'; }
        
        document.getElementById('style-btn').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('style-dropdown').classList.toggle('show'); });
        window.addEventListener('click', e => { const d = document.getElementById('style-dropdown'), w = document.querySelector('.style-select-wrapper'); if (d && d.classList.contains('show') && !w.contains(e.target)) d.classList.remove('show'); });
        document.addEventListener('click', () => { if (globalContainer.classList.contains('show-dashboard') && !wakeLock) requestWakeLock(); }, { once: false });
        document.addEventListener('visibilitychange', () => { if (wakeLock !== null && document.visibilityState === 'visible' && globalContainer.classList.contains('show-dashboard')) requestWakeLock(); });

        initTheme(); renderAllRows(); renderPresets(); iNP(); updateClock(); showDashboard();
    </script>
</body>
</html>
