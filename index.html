<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祥老師的投資戰情室 - 恆定監控穩定版</title>
    <style id="theme-style">
        :root {
            --primary: #006241; /* 長榮綠 */
            --accent: #e60012;  /* 裕民紅 */
            --bg-nav: rgba(20, 45, 40, 0.55); /* 更淺更透明的海綠背景 */
            --btn-bg: rgba(0, 98, 65, 0.4);
            --text: #ffffff; --gold: #f1c40f; --glow: #00d2ad;
            --bg-img: url('sea.png'); 
            --btn-gradient: linear-gradient(135deg, rgba(0, 98, 65, 0.7) 60%, rgba(192, 57, 43, 0.5));
            --ani-speed: 0s;
        }
        [data-theme="shiang"] {
            --primary: #ffffff; 
            --accent: #ffffff;  
            --bg-nav: rgba(20, 20, 20, 0.98); /* 紮實深黑背景 */
            --btn-bg: rgba(35, 35, 35, 0.9);  /* 加深按鈕底色 */
            --text: #ffffff;
            --gold: #ffffff;
            --glow: rgba(255, 255, 255, 0.3);
            --bg-img: url('hsiang.png'); 
            --btn-gradient: linear-gradient(transparent, transparent); /* 修正語法錯誤 */
        }

        /* 祥老師風格專屬對比修正 */
        [data-theme="shiang"] .btn {
            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: var(--btn-bg) !important;
            color: #ffffff !important;
            border-radius: 2px;
            box-shadow: none;
            background-image: none !important; /* 徹底移除精品風格的漸層 */
        }
        [data-theme="shiang"] .btn.selected {
            background: #ffffff !important;
            color: #000000 !important; /* 選中時白底黑字，極高辨識度 */
            border-color: #ffffff;
        }
        [data-theme="shiang"] .row-label {
            border-left: 2px solid #ffffff;
            color: #ffffff !important;
            letter-spacing: 4px;
            text-shadow: none;
        }
        [data-theme="shiang"] #search-input {
            border: 1px solid #555;
            border-bottom: 2px solid #fff;
            background: #000;
            color: #fff;
        }
        [data-theme="ai"] {
            --primary: #6c5ce7; --accent: #00d2ff;  
            --bg-nav: rgba(10, 10, 35, 0.85); 
            --btn-bg: rgba(40, 40, 80, 0.6);
            --text: #ffffff; --gold: #00d2ff; --glow: #a29bfe;
            --bg-img: url('tsmc.png'); 
            --btn-gradient: linear-gradient(135deg, #6c5ce7, #00d2ff, #6c5ce7);
            --ani-speed: 3s;
        }

        @keyframes fluidGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body, html { 
            margin: 0; height: 100%; font-family: "Microsoft JhengHei", "Segoe UI", sans-serif; 
            overflow: hidden; color: var(--text);
            background-color: #000;
            background: var(--bg-img) no-repeat center center fixed; background-size: cover;
            transition: background 0.8s ease; 
        }
        
        #container { display: flex; flex-direction: column; height: 100vh; position: relative; }
        /* 恆定跑馬燈樣式 - 強化底色確保清晰度 */
        .ticker-wrap { 
            width: 100%; height: 40px; 
            background: #000000; /* 純黑底色 */
            border-bottom: 1px solid rgba(255,255,255,0.15); 
            z-index: 35000; /* 提升至最頂層，超過所有控制鈕 */
            position: fixed; top: 0; left: 0; 
        }

        #nav { 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            position: absolute; top: 40px; left: 0; width: 100%; height: calc(100% - 40px);
            padding: 20px 20px 40px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-nav); backdrop-filter: blur(10px);
            z-index: 25000; overflow-y: auto; box-sizing: border-box;
            border-bottom: 5px solid var(--primary);
        }
        
        #container.nav-hidden #nav { transform: translateY(-110%); }

        #nav-toggle {
            position: fixed; top: 55px; right: 15px; z-index: 30000;
            background: var(--primary); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px; border-radius: 4px; cursor: pointer;
            font-size: 0.9rem; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: 0.3s; letter-spacing: 2px; touch-action: none;
        }
        [data-theme="shiang"] #nav-toggle {
            background: #1a1a1a !important; /* 深炭黑 */
            color: #ffffff !important;      /* 純白字 */
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            font-weight: 300;
            letter-spacing: 2px;
        }
        [data-theme="shiang"] #nav-toggle:hover {
            background: #ffffff !important;
            color: #000000 !important;
        }
        [data-theme="ai"] #nav-toggle { 
            background: linear-gradient(90deg, #6c5ce7, #00d2ff); 
            background-size: 200% 200%; animation: fluidGradient 3s infinite linear; border: none;
        }

        #content { 
            position: absolute; top: 40px; left: 0; width: 100%; height: calc(100% - 40px); 
            display: none; background: #000; z-index: 1; 
        }
        #container.active #content { display: block; }

        .nav-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; margin-bottom: 25px; }
        .mini-row { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }

        #clock { font-family: 'Courier New', monospace; font-size: 1.8rem; color: var(--glow); font-weight: 900; text-shadow: 0 0 10px rgba(0, 210, 173, 0.5); }

        .btn { 
            padding: 15px 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
            background: var(--btn-bg); 
            background-image: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.6) 100%), var(--btn-gradient);
            background-size: 100% 100%, 200% 200%; animation: fluidGradient var(--ani-speed) infinite linear;
            color: white; font-weight: bold; font-size: 1.3rem; 
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            text-align: center; width: 100%; box-sizing: border-box; min-height: 85px;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05); border-bottom: 4px solid rgba(0,0,0,0.4);
        }

        [data-theme="shiang"] .btn {
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 2px; font-weight: 300; letter-spacing: 2px; box-shadow: none; backdrop-filter: blur(5px);
        }
        [data-theme="shiang"] .btn.selected { background: #ffffff !important; color: #000000 !important; border-color: #ffffff; }

        .mini-row .btn, .mini-row #search-input, .mini-row .style-select-wrapper { 
            min-height: 50px !important; height: 50px !important; font-size: 1.1rem; padding: 5px 15px; box-sizing: border-box;
        }

        .btn:hover { filter: brightness(1.2); transform: translateY(-3px); border-bottom-color: var(--accent); }
        .btn.selected { background: var(--primary) !important; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        [data-theme="ai"] .btn.selected { background: linear-gradient(135deg, #6c5ce7, #00d2ff) !important; border: none; }

        #search-input { border-radius: 4px; border: 1px solid #444; background: rgba(0,0,0,0.3); color: white; width: 100%; outline: none; border-bottom: 3px solid var(--primary); margin: 0; }

        #btn-split { border-left: 4px solid var(--primary); }
        #btn-add { border-left: 4px solid #6c5ce7; }
        #btn-save { border-left: 4px solid #f0932b; }
        #manage-btn { border-left: 4px solid var(--accent); }
        #apply-split { background: var(--accent); border: none; }

        .style-select-wrapper { position: relative; display: flex; width: 100%; padding: 0 !important; }
        #style-btn { border-left: 4px solid #a29bfe; margin: 0; height: 50px; }
        .style-dropdown { position: absolute; top: 100%; left: 0; width: 100%; background: #1a1a2e; border: 1px solid #444; border-radius: 4px; display: none; z-index: 35000; box-shadow: 0 8px 20px rgba(0,0,0,0.8); }
        .style-dropdown.show { display: block; }
        .style-option { padding: 15px; cursor: pointer; font-weight: bold; border-bottom: 1px solid #333; transition: 0.2s; color: #fff; font-size: 1rem; }
        .style-option:hover { background: var(--primary); }

        .row-label { text-align: left; max-width: 1200px; margin: 0 auto 12px; font-weight: 900; font-size: 1.2rem; padding-left: 15px; letter-spacing: 2px; border-left: 6px solid var(--primary); text-transform: uppercase; transition: 0.3s; }
        [data-theme="shiang"] .row-label { border-left: 1px solid #ffffff; padding-left: 20px; font-weight: 300; letter-spacing: 4px; }
        [data-theme="ai"] .row-label { border-left-image: linear-gradient(to bottom, #6c5ce7, #00d2ff) 1; color: #00d2ff; text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }

        .split-item { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; border: 1px solid #333; }
        .split-item iframe { background: white; border: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; transition: opacity 0.5s ease; }
        .refresh-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--glow); width: 0%; z-index: 10; transition: width 0.1s linear; box-shadow: 0 0 10px var(--glow); }

        .split-controls { position: absolute; top: 10px; left: 10px; z-index: 20000; display: flex; gap: 5px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; border: 1px solid var(--primary); }
        .ctrl-btn { background: var(--primary); color: white; border: 1px solid rgba(255,255,255,0.3); width: 45px; height: 40px; cursor: pointer; font-size: 20px; font-weight: bold; }
        .zoom-info { background: rgba(0, 0, 0, 0.7); color: var(--gold); height: 34px; padding: 0 8px; border-radius: 4px; font-size: 13px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 600px) {
            #nav { padding-top: 20px; }
            .nav-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .mini-row { grid-template-columns: repeat(4, 1fr) !important; }
            .mini-row #clock-wrapper { grid-column: span 4; }
            .mini-row #search-input, .mini-row .style-select-wrapper { grid-column: span 2; }
            #clock { font-size: 2.5rem !important; }
            #welcome-text h1 { font-size: 2.2rem !important; }
            #nav-toggle { top: 45px; } 
        }

        .split-chk { display: none; width: 25px; height: 25px; accent-color: var(--accent); margin-right: 8px; }
        #nav.show-chks .split-chk { display: inline-block; }
        .btn-wrapper { display: flex; align-items: center; width: 100%; position: relative; }
        .del-badge { position: absolute; top: -10px; right: -10px; background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; border: 2px solid white; z-index: 100; }
        body.manage-mode .del-badge { display: flex; }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(1deg); } 75% { transform: rotate(-1deg); } 100% { transform: rotate(0deg); } }
        body.manage-mode .btn-wrapper .btn { animation: shake 0.3s infinite; pointer-events: none; }
    </style>
</head>

<script>
    const container = document.getElementById('container');
    const content = document.getElementById('content');
    let refreshConfigs = [];
    let wakeLock = null;

    function toggleStyleDropdown() { document.getElementById('style-dropdown').classList.toggle('show'); }
    function setTheme(theme) {
        if (theme === 'maritime') { document.body.removeAttribute('data-theme'); } 
        else { document.body.setAttribute('data-theme', theme); }
        localStorage.setItem('user_theme', theme);
        document.getElementById('style-dropdown').classList.remove('show');
    }
    function initTheme() { setTheme(localStorage.getItem('user_theme') || 'maritime'); }

    function refreshFrame(parent, oldIfr, url, myConf) {
        const newIfr = document.createElement('iframe');
        newIfr.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads allow-top-navigation-by-user-activation');
        newIfr.style.position = 'absolute'; newIfr.style.top = '0'; newIfr.style.left = '0';
        newIfr.style.width = oldIfr.style.width; newIfr.style.height = oldIfr.style.height;
        newIfr.style.transform = oldIfr.style.transform; newIfr.style.transformOrigin = '0 0';
        newIfr.style.opacity = '0'; newIfr.style.transition = 'opacity 0.5s ease';
        newIfr.style.zIndex = '0'; newIfr.src = url;
        parent.appendChild(newIfr);
        if (myConf.progress) { myConf.progress.style.transition = 'none'; myConf.progress.style.width = '0%'; }
        newIfr.onload = () => {
            newIfr.style.opacity = '1'; newIfr.style.zIndex = '1';
            setTimeout(() => { if (oldIfr.parentNode === parent) parent.removeChild(oldIfr); myConf.ifr = newIfr; }, 500);
        };
    }

    function createViewElement(url, initialInterval = 0, initialScale = 1.0) {
        const wrapper = document.createElement('div'); wrapper.className = 'split-item';
        const controls = document.createElement('div'); controls.className = 'split-controls';
        const progress = document.createElement('div'); progress.className = 'refresh-progress';
        const ifr = document.createElement('iframe'); 
        ifr.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads allow-top-navigation-by-user-activation'); 
        ifr.src = url; ifr.style.zIndex = '1';
        const myConf = { ifr, interval: initialInterval, timer: null, url, scale: initialScale, parent: wrapper, progress: progress };
        refreshConfigs.push(myConf);
        const updateZoom = (delta) => { 
            myConf.scale = Math.max(0.3, Math.min(2.0, Math.round((myConf.scale + delta) * 10) / 10)); 
            myConf.ifr.style.width = (100 / myConf.scale) + '%'; myConf.ifr.style.height = (100 / myConf.scale) + '%'; 
            myConf.ifr.style.transform = `scale(${myConf.scale})`; zInfo.innerText = Math.round(myConf.scale * 100) + '%'; 
        };
        if (initialScale !== 1.0) updateZoom(0);
        const intervals = [0, 3000, 5000, 10000, 30000];
        const labels = ['🕒', '🕒 3s', '🕒 5s', '🕒 10s', '🕒 30s'];
        let idx = intervals.indexOf(initialInterval); if (idx === -1) idx = 0;
        const setupTimer = () => { 
            if (myConf.timer) { clearInterval(myConf.timer); myConf.timer = null; }
            autoBtn.innerHTML = labels[idx]; autoBtn.style.background = myConf.interval > 0 ? 'var(--accent)' : ''; 
            if (myConf.interval > 0) {
                progress.style.transition = `width ${myConf.interval}ms linear`;
                setTimeout(() => { progress.style.width = '100%'; }, 50);
                myConf.timer = setInterval(() => { 
                    refreshFrame(wrapper, myConf.ifr, url, myConf);
                    progress.style.transition = 'none'; progress.style.width = '0%';
                    setTimeout(() => { progress.style.transition = `width ${myConf.interval}ms linear`; progress.style.width = '100%'; }, 50);
                }, myConf.interval); 
            } else { progress.style.width = '0%'; }
        };
        const refBtn = createCtrlBtn('🔄', () => { refreshFrame(wrapper, myConf.ifr, url, myConf); });
        const autoBtn = createCtrlBtn('🕒', null); autoBtn.onclick = () => { idx = (idx + 1) % intervals.length; myConf.interval = intervals[idx]; setupTimer(); };
        const zinBtn = createCtrlBtn('➕', () => updateZoom(0.1));
        const zoutBtn = createCtrlBtn('➖', () => updateZoom(-0.1));
        const zInfo = document.createElement('span'); zInfo.className = 'zoom-info'; zInfo.innerText = Math.round(initialScale * 100) + '%';
        if (initialInterval > 0) setupTimer();
        [refBtn, autoBtn, zinBtn, zoutBtn, zInfo].forEach(el => controls.appendChild(el));
        wrapper.appendChild(controls); wrapper.appendChild(ifr); wrapper.appendChild(progress);
        return wrapper;
    }

    function createCtrlBtn(text, onClick) { const b = document.createElement('button'); b.className = 'ctrl-btn'; b.innerHTML = text; if (onClick) b.onclick = onClick; return b; }
    function loadPage(btn, url, interval = 0, scale = 1.0) {
        if (document.getElementById('nav').classList.contains('show-chks')) { const chk = btn.parentElement.querySelector('.split-chk'); if (chk) chk.checked = !chk.checked; return; }
        container.classList.add('active'); if (!container.classList.contains('nav-hidden')) container.classList.add('nav-hidden');
        updateToggleText(); content.innerHTML = ''; clearAllTimers(); content.appendChild(createViewElement(url, interval, scale));
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected')); if (btn) btn.classList.add('selected');
    }
    function toggleSplitMode() { const nav = document.getElementById('nav'); nav.classList.toggle('show-chks'); document.getElementById('apply-split').style.display = nav.classList.contains('show-chks') ? 'inline-block' : 'none'; }
    function startSplit(urls = null) {
        const selected = urls || Array.from(document.querySelectorAll('.split-chk:checked')).map(cb => cb.value);
        if (selected.length < 2) return alert("請至少選擇 2 個網頁");
        clearAllTimers(); content.innerHTML = ''; content.classList.add('split-grid'); container.classList.add('active', 'nav-hidden'); updateToggleText();
        const count = selected.length; const cols = count <= 2 ? count : (count <= 4 ? 2 : (count <= 6 ? 3 : 4)); const rows = Math.ceil(count / cols);
        content.style.gridTemplateColumns = `repeat(${cols}, 1fr)`; content.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        selected.forEach(u => { const val = typeof u === 'string' ? u : u.url; content.appendChild(createViewElement(val, u.interval || 0, u.scale || 1.0)); });
        if (!urls) toggleSplitMode();
    }
    function saveCurrentLayout() {
        if (!container.classList.contains('active')) return alert("請先開啟網頁");
        const name = prompt("配置名稱：", "我的配置 " + new Date().toLocaleTimeString()); if (!name) return;
        const preset = { name, isSplit: content.classList.contains('split-grid'), views: refreshConfigs.map(c => ({ url: c.url, interval: c.interval, scale: c.scale })) };
        const presets = JSON.parse(localStorage.getItem('user_presets') || "[]"); presets.push(preset); localStorage.setItem('user_presets', JSON.stringify(presets)); renderPresets();
    }
    let isManageMode = false;
    function toggleManageMode() { isManageMode = !isManageMode; document.body.classList.toggle('manage-mode', isManageMode); document.getElementById('manage-btn').innerText = isManageMode ? '✅ 完成' : '管理'; renderPresets(); renderCustomBtns(); }
    function renderPresets() {
        const row = document.getElementById('presets-row'); const list = document.getElementById('presets-list'); const presets = JSON.parse(localStorage.getItem('user_presets') || "[]");
        if (presets.length === 0) { row.style.display = 'none'; return; } row.style.display = 'grid'; list.innerHTML = '';
        presets.forEach((p, i) => { const wrapper = document.createElement('div'); wrapper.className = 'btn-wrapper'; const btn = document.createElement('button'); btn.className = 'btn'; btn.style.background = '#4834d4'; btn.innerText = p.name; btn.onclick = () => { if (isManageMode) return; p.isSplit ? startSplit(p.views) : loadPage(null, p.views[0].url, p.views[0].interval, p.views[0].scale); }; const del = document.createElement('div'); del.className = 'del-badge'; del.innerText = '×'; del.onclick = (e) => { e.stopPropagation(); if (confirm(`刪除「${p.name}」？`)) { presets.splice(i, 1); localStorage.setItem('user_presets', JSON.stringify(presets)); renderPresets(); } }; wrapper.appendChild(btn); wrapper.appendChild(del); list.appendChild(wrapper); });
    }
    function updateClock() { const now = new Date(); document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0'); }
    setInterval(updateClock, 1000); updateClock();
    function filterButtons() { const term = document.getElementById('search-input').value.toLowerCase(); document.querySelectorAll('.btn-wrapper, .btn.ext').forEach(el => { const name = el.getAttribute('data-name') || el.innerText; el.style.display = name.toLowerCase().includes(term) ? '' : 'none'; }); }
    function addBtn() { const name = prompt("名稱："); const url = prompt("網址：", "https://"); if (!name || !url) return; const isExt = confirm("另開新視窗？"); const btns = JSON.parse(localStorage.getItem('user_btns') || "[]"); btns.push({name, url, isExt}); localStorage.setItem('user_btns', JSON.stringify(btns)); renderCustomBtns(); }
    function renderCustomBtns() {
        const list = document.getElementById('custom-list'); list.innerHTML = ''; const btns = JSON.parse(localStorage.getItem('user_btns') || "[]");
        btns.forEach((b, i) => { const wrapper = document.createElement('div'); wrapper.className = 'btn-wrapper'; wrapper.setAttribute('data-name', b.name); const chk = document.createElement('input'); chk.type = 'checkbox'; chk.className = 'split-chk'; chk.value = b.url; const btn = document.createElement('button'); btn.className = 'btn' + (b.isExt ? ' ext' : ''); btn.innerText = b.name + (b.isExt ? " ↗" : ""); btn.onclick = () => { if (isManageMode) return; b.isExt ? openExtPage(b.url) : loadPage(btn, b.url); }; const del = document.createElement('div'); del.className = 'del-badge'; del.innerText = '×'; del.onclick = (e) => { e.stopPropagation(); if (confirm(`刪除「${b.name}」？`)) { btns.splice(i, 1); localStorage.setItem('user_btns', JSON.stringify(btns)); renderCustomBtns(); } }; wrapper.appendChild(chk); wrapper.appendChild(btn); wrapper.appendChild(del); list.appendChild(wrapper); });
        filterButtons();
    }
    let activeExtWin = null; function openExtPage(url) { activeExtWin = window.open(url, '_blank'); }
    window.onclick = function(event) { if (!event.target.matches('#style-btn')) { const dropdowns = document.getElementsByClassName("style-dropdown"); for (let i = 0; i < dropdowns.length; i++) { if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show'); } } }
    async function requestWakeLock() { try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { wakeLock = null; }); } } catch (err) {} }
    function clearAllTimers() { refreshConfigs.forEach(conf => { if (conf.timer) clearInterval(conf.timer); }); refreshConfigs = []; }
    function toggleNav() { container.classList.toggle('nav-hidden'); updateToggleText(); }
    function updateToggleText() { const b = document.getElementById('nav-toggle'); b.innerText = container.classList.contains('nav-hidden') ? '選單 🔽' : '選單 🔼'; }
    function goHome() { clearAllTimers(); container.classList.remove('active', 'nav-hidden'); updateToggleText(); content.innerHTML = ''; document.getElementById('nav').classList.remove('show-chks'); document.getElementById('apply-split').style.display = 'none'; document.querySelectorAll('.split-chk').forEach(c => c.checked = false); document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected')); }
    document.addEventListener('visibilitychange', async () => { if (document.visibilityState === 'hidden') { refreshConfigs.forEach(conf => { if (conf.timer) { clearInterval(conf.timer); conf.timer = null; } }); } else { refreshConfigs.forEach(conf => { if (conf.interval > 0) { refreshFrame(conf.parent, conf.ifr, conf.url, conf); setupTimerOnRestore(conf); } }); if (wakeLock !== null) await requestWakeLock(); } });
    function setupTimerOnRestore(myConf) {
        if (myConf.timer) clearInterval(myConf.timer);
        myConf.progress.style.transition = 'none'; myConf.progress.style.width = '0%';
        setTimeout(() => { myConf.progress.style.transition = `width ${myConf.interval}ms linear`; myConf.progress.style.width = '100%'; }, 50);
        myConf.timer = setInterval(() => { 
            refreshFrame(myConf.parent, myConf.ifr, myConf.url, myConf);
            myConf.progress.style.transition = 'none'; myConf.progress.style.width = '0%';
            setTimeout(() => { myConf.progress.style.transition = `width ${myConf.interval}ms linear`; myConf.progress.style.width = '100%'; }, 50);
        }, myConf.interval);
    }
    document.addEventListener('click', () => { if (!wakeLock) requestWakeLock(); }, { once: true });
    const navToggle = document.getElementById('nav-toggle'); let isDragging = false, startX, startY, initialX, initialY;
    function initNavPos() { try { const p = JSON.parse(localStorage.getItem('nav_btn_pos')); if (p) { const l = parseFloat(p.left), t = parseFloat(p.top); if (l > 0 && l < window.innerWidth && t > 0 && t < window.innerHeight) { navToggle.style.left = p.left; navToggle.style.top = p.top; navToggle.style.right = 'auto'; } } } catch(e) {} }
    navToggle.onpointerdown = (e) => { isDragging = false; startX = e.clientX; startY = e.clientY; const r = navToggle.getBoundingClientRect(); initialX = r.left; initialY = r.top; navToggle.setPointerCapture(e.pointerId); navToggle.style.transition = 'none'; };
    navToggle.onpointermove = (e) => { if (e.buttons === 0) return; const dx = e.clientX - startX, dy = e.clientY - startY; if (Math.abs(dx) > 5 || Math.abs(dy) > 5) { isDragging = true; navToggle.style.left = (initialX + dx) + 'px'; navToggle.style.top = (initialY + dy) + 'px'; navToggle.style.right = 'auto'; } };
    navToggle.onpointerup = (e) => { navToggle.releasePointerCapture(e.pointerId); navToggle.style.transition = '0.3s'; if (!isDragging) toggleNav(); else localStorage.setItem('nav_btn_pos', JSON.stringify({ left: navToggle.style.left, top: navToggle.style.top })); };
    initTheme(); initNavPos(); renderCustomBtns(); renderPresets();
</script>
